name: Download JARs

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Download JARs with Gradle
        run: |
          cat > build.gradle << 'EOF'
          repositories {
              mavenCentral()
              google()
          }
          
          configurations {
              download
          }
          
          dependencies {
              download 'com.android.tools.build:gradle:8.1.0'
              download 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              download 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              download 'androidx.core:core-ktx:1.12.0'
              download 'androidx.appcompat:appcompat:1.6.1'
              download 'com.google.android.material:material:1.11.0'
          }
          
          task downloadJars(type: Copy) {
              from configurations.download
              into 'jars'
          }
          EOF
          
          gradle downloadJars --no-daemon
          
      - name: List downloaded JARs
        run: |
          echo "# Downloaded JARs" > JAR_LIST.md
          echo "" >> JAR_LIST.md
          echo "\`\`\`" >> JAR_LIST.md
          ls -lh jars/ >> JAR_LIST.md
          echo "\`\`\`" >> JAR_LIST.md
          echo "" >> JAR_LIST.md
          echo "Total: $(ls jars/ | wc -l) files" >> JAR_LIST.md
          
      - name: Commit JARs
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add jars/
          git add JAR_LIST.md
          git commit -m "Add pre-downloaded JAR files"
          git push
