name: Gradle Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar "https://github.com/gradle/gradle/raw/v8.5/gradle/wrapper/gradle-wrapper.jar"
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo '#!/bin/sh' > gradlew
          echo 'exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
      
      - name: Download dependencies
        run: |
          ./gradlew dependencies --no-daemon 2>&1 || true
          ./gradlew build --no-daemon --dry-run 2>&1 || true
      
      - name: Prepare cache
        run: |
          mkdir -p offline-cache/caches
          mkdir -p offline-cache/wrapper
          
          if [ -d ~/.gradle/caches/modules-2 ]; then
            cp -r ~/.gradle/caches/modules-2 offline-cache/caches/
          fi
          
          if [ -d ~/.gradle/wrapper/dists ]; then
            cp -r ~/.gradle/wrapper/dists offline-cache/wrapper/
          fi
          
          cp -r gradle/wrapper offline-cache/
          cp gradlew offline-cache/
          
          echo '#!/bin/bash' > offline-cache/install.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> offline-cache/install.sh
          echo 'mkdir -p ~/.gradle' >> offline-cache/install.sh
          echo 'ln -sfn "$SCRIPT_DIR/caches" ~/.gradle/caches' >> offline-cache/install.sh
          echo 'ln -sfn "$SCRIPT_DIR/wrapper/dists" ~/.gradle/wrapper/dists' >> offline-cache/install.sh
          echo 'echo "Cache installed"' >> offline-cache/install.sh
          
          chmod +x offline-cache/install.sh
      
      - name: Push to branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git checkout --orphan gradle-cache
          git rm -rf . 2>/dev/null || true
          
          mv offline-cache/* .
          rm -rf offline-cache
          
          git add .
          git commit -m "Gradle cache $(date +%Y%m%d)"
          git push origin gradle-cache --force
