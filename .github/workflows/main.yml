name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to the repository
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2.1'
      
      - name: Backup and replace build files
        run: |
          # Backup original files
          if [ -f "build.gradle.kts" ]; then
            cp build.gradle.kts build.gradle.kts.original
          fi
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.original
          fi
          
          # Create settings.gradle.kts with proper plugin management
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
          }
          EOF
          
          # Create app/build.gradle.kts with proper configuration
          mkdir -p app
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.temp"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.temp"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
          
          echo "Created temporary build files"
      
      - name: Download dependencies
        run: |
          # Use gradle from the setup action (version 9.2.1)
          gradle --no-daemon dependencies || true
          gradle --no-daemon build --dry-run || true
          
          echo "Dependency download completed"
          
          # Show cache size
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
          fi
      
      - name: Prepare dependencies for repository
        run: |
          # Create .gradle-cache directory in the repository
          mkdir -p .gradle-cache
          
          # Copy caches to repository
          if [ -d "$HOME/.gradle/caches" ]; then
            cp -r $HOME/.gradle/caches .gradle-cache/
            echo "Copied Gradle caches"
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            cp -r $HOME/.gradle/wrapper .gradle-cache/
            echo "Copied Gradle wrapper"
          fi
          
          # Create a restore script in the repo
          cat > .gradle-cache/restore.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          
          echo "Restoring Gradle dependencies from repo to ~/.gradle..."
          
          # Restore caches to home directory
          if [ -d "$SCRIPT_DIR/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/caches" "$HOME/.gradle/"
            echo "✓ Restored Gradle caches"
          else
            echo "⚠ No caches directory found"
          fi
          
          if [ -d "$SCRIPT_DIR/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/wrapper" "$HOME/.gradle/"
            echo "✓ Restored Gradle wrapper"
          else
            echo "⚠ No wrapper directory found"
          fi
          
          echo ""
          echo "✓ Restore complete! Dependencies are now in ~/.gradle"
          echo "You can verify with: ./gradlew dependencies"
          EOF
          
          chmod +x .gradle-cache/restore.sh
          
          # Create setup script for automated restore
          cat > setup-gradle-cache.sh << 'EOF'
          #!/bin/bash
          # Script to restore Gradle cache from repository
          
          if [ -f ".gradle-cache/restore.sh" ]; then
            .gradle-cache/restore.sh
          else
            echo "Error: .gradle-cache directory not found"
            echo "Please run the Gradle Dependencies workflow first"
            exit 1
          fi
          EOF
          
          chmod +x setup-gradle-cache.sh
          
          # Create .gitignore to avoid committing unnecessary files
          cat > .gradle-cache/.gitignore << 'EOF'
          # Ignore temporary files
          *.lock
          *.tmp
          tmp/
          # Keep the structure but ignore large files if needed
          EOF
          
          # Create README
          cat > .gradle-cache/README.md << 'EOF'
          # Gradle Dependencies Cache
          
          This directory contains cached Gradle dependencies for offline builds.
          
          ## Size Warning
          This directory can be large (hundreds of MB). Consider using Git LFS or 
          only including it if offline builds are essential.
          
          ## Restore Cache
          ```bash
          # Run the restore script
          .gradle-cache/restore.sh
          
          # Or use the setup script from root
          ./setup-gradle-cache.sh
