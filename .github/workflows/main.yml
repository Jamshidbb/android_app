name: Android Project Setup and Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create Android project
        run: |
          chmod +x scripts/create_android_project.sh
          ./scripts/create_android_project.sh
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
      
      - name: Build project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Copy artifacts
        run: |
          mkdir -p artifacts/latest artifacts/backup
          cp -r app/build/outputs/apk/* artifacts/latest/
          cp -r app/build/outputs/apk/* artifacts/backup/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: artifacts/
