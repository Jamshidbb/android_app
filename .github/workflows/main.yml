name: Download Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'  # Adjust based on your project
      
      - name: Get Gradle Wrapper version
        id: gradle-version
        run: |
          # Extract distributionUrl from gradle-wrapper.properties
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            DIST_URL=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2)
            GRADLE_VERSION=$(echo $DIST_URL | grep -oP 'gradle-\K[0-9.]+')
            echo "gradle_version=$GRADLE_VERSION" >> $GITHUB_OUTPUT
            echo "Found Gradle version: $GRADLE_VERSION"
          else
            echo "No gradle-wrapper.properties found"
            exit 1
          fi
      
      - name: Setup Gradle wrapper
        run: |
          # Download and setup the specific Gradle version from wrapper
          GRADLE_VERSION="${{ steps.gradle-version.outputs.gradle_version }}"
          if [ ! -z "$GRADLE_VERSION" ]; then
            if [ ! -f "gradlew" ]; then
              echo "Initializing Gradle wrapper..."
              gradle wrapper --gradle-version $GRADLE_VERSION
            fi
            chmod +x gradlew
          fi
      
      - name: Download dependencies
        id: download-deps
        run: |
          # Make gradlew executable
          chmod +x gradlew
          
          # Download all dependencies including plugin dependencies
          ./gradlew dependencies --configuration compileClasspath
          ./gradlew dependencies --configuration runtimeClasspath
          ./gradlew dependencies --configuration testCompileClasspath
          ./gradlew build --dry-run
          
          # Force download all dependencies
          ./gradlew build -x test -x check --no-daemon
          
          # Find and list downloaded dependencies
          echo "Gradle user home: $HOME/.gradle/caches"
          
          # Extract dependency cache path
          CACHE_PATH="$HOME/.gradle/caches/modules-2/files-2.1"
          if [ -d "$CACHE_PATH" ]; then
            echo "Dependencies downloaded to: $CACHE_PATH"
            du -sh "$CACHE_PATH"
          fi
      
      - name: Prepare dependencies for commit
        run: |
          # Create .gradle-dependencies directory in repo root
          mkdir -p .gradle-dependencies
          
          # Copy Gradle wrapper (preserve existing if any)
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy build files needed for dependency resolution
          find . -maxdepth 2 -name "build.gradle*" -exec cp {} .gradle-dependencies/ \; 2>/dev/null || true
          find . -maxdepth 2 -name "settings.gradle*" -exec cp {} .gradle-dependencies/ \; 2>/dev/null || true
          
          # Copy dependency cache with structure preserved
          if [ -d "$HOME/.gradle/caches/modules-2/files-2.1" ]; then
            mkdir -p .gradle-dependencies/.gradle/caches
            cp -r $HOME/.gradle/caches/modules-2 .gradle-dependencies/.gradle/caches/
            
            # Also copy wrapper distribution if exists
            if [ -d "$HOME/.gradle/wrapper/dists" ]; then
              mkdir -p .gradle-dependencies/.gradle/wrapper
              cp -r $HOME/.gradle/wrapper/dists .gradle-dependencies/.gradle/wrapper/
            fi
          fi
          
          # Create a script to restore dependencies locally
          cat > .gradle-dependencies/restore-dependencies.sh << 'EOF'
          #!/bin/bash
          # Script to restore Gradle dependencies locally
          
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          
          echo "Restoring Gradle dependencies from cached files..."
          
          # Copy Gradle wrapper files back to repo root
          cp -r "$SCRIPT_DIR"/gradle "$REPO_ROOT"/ 2>/dev/null || true
          cp "$SCRIPT_DIR"/gradlew "$REPO_ROOT"/ 2>/dev/null || true
          cp "$SCRIPT_DIR"/gradlew.bat "$REPO_ROOT"/ 2>/dev/null || true
          
          # Copy build files
          cp "$SCRIPT_DIR"/build.gradle* "$REPO_ROOT"/ 2>/dev/null || true
          cp "$SCRIPT_DIR"/settings.gradle* "$REPO_ROOT"/ 2>/dev/null || true
          
          # Restore Gradle caches to user's home
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"
            echo "✓ Gradle caches restored"
          fi
          
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"
            echo "✓ Gradle wrapper distributions restored"
          fi
          
          # Make gradlew executable
          chmod +x "$REPO_ROOT/gradlew" 2>/dev/null || true
          
          echo "✓ Dependencies restored successfully!"
          echo "You can now run './gradlew build' locally without downloading dependencies again."
          EOF
          
          chmod +x .gradle-dependencies/restore-dependencies.sh
          
          # Create installation instruction file
          cat > .gradle-dependencies/README.md << 'EOF'
          # Gradle Dependencies Cache
          
          This directory contains pre-downloaded Gradle dependencies and wrapper distributions.
          
          ## Restoring Dependencies Locally
          
          To restore these dependencies on your local machine:
          
          ```bash
          # Make the restore script executable
          chmod +x restore-dependencies.sh
          
          # Run the restore script
          ./restore-dependencies.sh
