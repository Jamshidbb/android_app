name: Gradle Dependencies

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/gradle/libs.versions.toml'
      - '**/gradle/wrapper/gradle-wrapper.properties'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-push-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Extract Gradle version
        id: gradle-version
        run: |
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            DISTRIBUTION_URL=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2 | tr -d ' ')
            GRADLE_VERSION=$(echo "$DISTRIBUTION_URL" | grep -oP 'gradle-\K[0-9.]+' | head -1)
            echo "version=$GRADLE_VERSION" >> $GITHUB_OUTPUT
            echo "Using Gradle version: $GRADLE_VERSION"
          else
            echo "version=8.5" >> $GITHUB_OUTPUT
            echo "Using default Gradle version: 8.5"
          fi
      
      - name: Setup Gradle wrapper
        run: |
          # Create gradlew if it doesn't exist
          if [ ! -f "gradlew" ]; then
            echo "Creating Gradle wrapper..."
            mkdir -p gradle/wrapper
            
            # Create gradle-wrapper.properties using echo (no heredoc)
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-${{ steps.gradle-version.outputs.version }}-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            
            # Download gradle-wrapper.jar
            curl -s -L "https://services.gradle.org/distributions/gradle-${{ steps.gradle-version.outputs.version }}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            cp "/tmp/gradle-${{ steps.gradle-version.outputs.version }}/lib/plugins/gradle-wrapper.jar" gradle/wrapper/ 2>/dev/null || true
            
            # Create gradlew script
            echo '#!/bin/sh' > gradlew
            echo 'java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
            chmod +x gradlew
            
            echo "✅ Gradle wrapper created"
          else
            chmod +x gradlew
            echo "✅ gradlew already exists"
          fi
          
          # Test gradlew
          ./gradlew --version || echo "⚠️ Gradle wrapper test had issues"
      
      - name: Download dependencies
        run: |
          echo "Downloading dependencies..."
          
          # Download dependencies
          ./gradlew build --dry-run 2>&1 || true
          ./gradlew dependencies 2>&1 || true
          
          # Create a simple Gradle script file (using printf to avoid heredoc issues)
          printf '%s\n' \
            'task downloadDependencies {' \
            '    doLast {' \
            '        configurations.findAll { it.canBeResolved }.each { config ->' \
            '            try {' \
            '                println "Resolving: ${config.name}"' \
            '                config.files' \
            '            } catch (Exception e) {' \
            '                println "Failed: ${config.name}"' \
            '            }' \
            '        }' \
            '    }' \
            '}' > download.gradle
          
          ./gradlew -b download.gradle downloadDependencies 2>&1 || true
          
          echo "✅ Dependency download completed"
      
      - name: Prepare cache directory
        run: |
          echo "Preparing cache..."
          
          # Create cache directory
          mkdir -p gradle-cache-temp
          
          # Copy Gradle caches if they exist
          if [ -d ~/.gradle/caches/modules-2 ]; then
            mkdir -p gradle-cache-temp/caches
            cp -r ~/.gradle/caches/modules-2 gradle-cache-temp/caches/
            echo "✅ Copied modules cache"
          fi
          
          if [ -d ~/.gradle/wrapper/dists ]; then
            cp -r ~/.gradle/wrapper/dists gradle-cache-temp/wrapper/
            echo "✅ Copied wrapper distributions"
          fi
          
          # Count files and size
          JAR_COUNT=$(find gradle-cache-temp -name "*.jar" 2>/dev/null | wc -l)
          CACHE_SIZE=$(du -sh gradle-cache-temp 2>/dev/null | cut -f1)
          
          # Create cache info with printf
          printf '%s\n' \
            "===================================" \
            "GRADLE DEPENDENCY CACHE" \
            "===================================" \
            "Created: $(date -u)" \
            "Gradle Version: ${{ steps.gradle-version.outputs.version }}" \
            "Repository: ${{ github.repository }}" \
            "JAR files: $JAR_COUNT" \
            "Cache size: $CACHE_SIZE" \
            "" \
            "Usage: Run setup-cache.sh to install" > gradle-cache-temp/cache-info.txt
          
          echo "✅ Cache prepared with $JAR_COUNT JAR files ($CACHE_SIZE)"
      
      - name: Create setup script
        run: |
          # Create setup-cache.sh using printf
          printf '%s\n' \
            '#!/bin/bash' \
            'echo "Setting up Gradle cache..."' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            'mkdir -p ~/.gradle' \
            'if [ -d ~/.gradle/caches ] && [ ! -L ~/.gradle/caches ]; then' \
            '    mv ~/.gradle/caches ~/.gradle/caches.backup.$(date +%s)' \
            'fi' \
            'if [ -d ~/.gradle/wrapper ] && [ ! -L ~/.gradle/wrapper ]; then' \
            '    mv ~/.gradle/wrapper ~/.gradle/wrapper.backup.$(date +%s)' \
            'fi' \
            'rm -f ~/.gradle/caches' \
            'rm -f ~/.gradle/wrapper' \
            'if [ -d "$SCRIPT_DIR/caches" ]; then' \
            '    ln -sfn "$SCRIPT_DIR/caches" ~/.gradle/caches' \
            '    echo "✅ Linked dependency cache"' \
            'fi' \
            'if [ -d "$SCRIPT_DIR/wrapper" ]; then' \
            '    ln -sfn "$SCRIPT_DIR/wrapper" ~/.gradle/wrapper' \
            '    echo "✅ Linked wrapper distributions"' \
            'fi' \
            'echo ""' \
            'cat "$SCRIPT_DIR/cache-info.txt"' \
            'echo ""' \
            'echo "✅ Setup complete! Run: ./gradlew build"' > gradle-cache-temp/setup-cache.sh
          
          chmod +x gradle-cache-temp/setup-cache.sh
          echo "✅ Setup script created"
      
      - name: Push to cache branch
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Set up authentication
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Create or switch to cache branch
          CACHE_BRANCH="gradle-dependency-cache"
          
          if git ls-remote --heads origin "$CACHE_BRANCH" | grep -q "$CACHE_BRANCH"; then
            echo "Updating existing branch: $CACHE_BRANCH"
            git fetch origin "$CACHE_BRANCH"
            git checkout "$CACHE_BRANCH" || git checkout -b "$CACHE_BRANCH" "origin/$CACHE_BRANCH"
          else
            echo "Creating new branch: $CACHE_BRANCH"
            git checkout --orphan "$CACHE_BRANCH"
            git rm -rf . 2>/dev/null || true
          fi
          
          # Remove old cache if exists
          rm -rf .gradle-cache 2>/dev/null || true
          
          # Move new cache
          mv gradle-cache-temp .gradle-cache
          
          # Create README with printf
          printf '%s\n' \
            '# Gradle Dependency Cache' \
            '' \
            'This branch contains pre-downloaded Gradle dependencies.' \
            '' \
            '## Quick Start' \
            '' \
            '```bash' \
            '# Checkout this branch' \
            'git checkout gradle-dependency-cache' \
            '' \
            '# Run the setup script' \
            './.gradle-cache/setup-cache.sh' \
            '' \
            '# Go back to your working branch' \
            'git checkout -' \
            '' \
            '# Build your project' \
            './gradlew build' \
            '```' \
            '' \
            "Last updated: $(date -u)" > README.md
          
          # Add and commit
          git add .gradle-cache README.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Gradle cache - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin "$CACHE_BRANCH" --force
            echo "✅ Successfully pushed to $CACHE_BRANCH"
          fi
      
      - name: Upload artifact as fallback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-cache
          path: .gradle-cache/
          retention-days: 7
