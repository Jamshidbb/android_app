name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2.1'
      
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "gradle-cache/**/*.jar"
          git lfs track "gradle-cache/**/*.pom"
          git lfs track "gradle-cache/**/*.aar"
          git lfs track "gradle-cache/**/*.so"
          git lfs track "gradle-cache/**/*.dll"
          git lfs track "gradle-cache/**/*.dylib"
          git add .gitattributes
      
      - name: Create temporary build files
        run: |
          # Backup original files
          [ -f "build.gradle.kts" ] && cp build.gradle.kts build.gradle.kts.original
          [ -f "settings.gradle.kts" ] && cp settings.gradle.kts settings.gradle.kts.original
          
          # Create settings.gradle.kts
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
          }
          EOF
          
          # Create app/build.gradle.kts
          mkdir -p app
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.temp"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.temp"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
      
      - name: Download dependencies
        run: |
          gradle --no-daemon dependencies || true
          gradle --no-daemon build --dry-run || true
          echo "Dependency download completed"
      
      - name: Copy dependencies to repo
        run: |
          # Create gradle-cache directory in repo root
          mkdir -p gradle-cache
          
          # Copy Gradle caches to repo (excluding large temp files)
          if [ -d "$HOME/.gradle/caches" ]; then
            # Exclude large cache files that can be regenerated
            rsync -av --exclude='*.lock' \
                      --exclude='tmp/' \
                      --exclude='journal-*' \
                      --exclude='fileHashes.bin' \
                      --exclude='fileSnapshots.bin' \
                      --exclude='resourceHashesCache.bin' \
                      --exclude='buildHistory.bin' \
                      --exclude='outputFiles.bin' \
                      $HOME/.gradle/caches/ gradle-cache/caches/
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            cp -r $HOME/.gradle/wrapper gradle-cache/
          fi
          
          # Create restore script
          cat > gradle-cache/restore.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "Restoring Gradle dependencies from repo..."
          
          if [ -d "$SCRIPT_DIR/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/caches" "$HOME/.gradle/"
            echo "✓ Restored caches"
          fi
          
          if [ -d "$SCRIPT_DIR/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/wrapper" "$HOME/.gradle/"
            echo "✓ Restored wrapper"
          fi
          
          echo "✓ Restore complete"
          EOF
          chmod +x gradle-cache/restore.sh
          
          # Create restore script at root for easy access
          cat > restore-gradle-cache.sh << 'EOF'
          #!/bin/bash
          if [ -d "gradle-cache" ]; then
            gradle-cache/restore.sh
          else
            echo "Error: gradle-cache directory not found"
          fi
          EOF
          chmod +x restore-gradle-cache.sh
          
          echo "Dependencies copied to gradle-cache/"
          echo "Size: $(du -sh gradle-cache 2>/dev/null | cut -f1)"
      
      - name: Restore original build files
        run: |
          [ -f "build.gradle.kts.original" ] && mv build.gradle.kts.original build.gradle.kts
          [ -f "settings.gradle.kts.original" ] && mv settings.gradle.kts.original settings.gradle.kts
          rm -rf app 2>/dev/null || true
      
      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update .gitignore
          if ! grep -q "^gradle-cache/" .gitignore 2>/dev/null; then
            echo "" >> .gitignore
            echo "# Gradle cache (optional - remove if you want to commit it)" >> .gitignore
            echo "# gradle-cache/" >> .gitignore
            echo "restore-gradle-cache.sh" >> .gitignore
          fi
          
          # Check file sizes
          echo "Checking for files > 100MB (GitHub limit)..."
          find gradle-cache -type f -size +90M -exec ls -lh {} \;
          
          # Add files (git-lfs will handle large files)
          git add .gitattributes
          git add gradle-cache/ restore-gradle-cache.sh
          git add .gitignore
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Gradle dependencies cache [skip ci]"
            
            # Push with increased buffer for large files
            git config http.postBuffer 524288000
            git push origin ${{ github.ref_name }}
            echo "✓ Pushed to repository"
          fi
      
      - name: Warning about large files
        if: always()
        run: |
          echo "=============================================="
          echo "⚠️  IMPORTANT NOTE ABOUT LARGE FILES"
          echo "=============================================="
          echo ""
          echo "If you see errors about files exceeding 100MB,"
          echo "you NEED to configure Git LFS:"
          echo ""
          echo "1. Install Git LFS locally:"
          echo "   git lfs install"
          echo ""
          echo "2. Track large file types:"
          echo "   git lfs track 'gradle-cache/**/*.jar'"
          echo "   git lfs track 'gradle-cache/**/*.aar'"
          echo "   git lfs track 'gradle-cache/**/*.so'"
          echo ""
          echo "3. Re-run this workflow after LFS is set up"
          echo ""
          echo "Alternative: Don't commit the cache to the repo"
          echo "Use the artifact from this workflow instead"
          echo "=============================================="
