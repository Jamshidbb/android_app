name: Download Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Get Gradle Wrapper version
        id: gradle-version
        run: |
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            DIST_URL=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2)
            GRADLE_VERSION=$(echo $DIST_URL | grep -oP 'gradle-\K[0-9.]+')
            echo "gradle_version=$GRADLE_VERSION" >> $GITHUB_OUTPUT
            echo "Found Gradle version: $GRADLE_VERSION"
          else
            echo "No gradle-wrapper.properties found, using default"
            echo "gradle_version=8.5" >> $GITHUB_OUTPUT
          fi
      
      - name: Install Gradle (if no wrapper exists)
        run: |
          # Check if gradlew exists
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, installing Gradle..."
            GRADLE_VERSION="${{ steps.gradle-version.outputs.gradle_version }}"
            
            # Download and install Gradle
            wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle-${GRADLE_VERSION}-bin.zip
            export PATH=$PATH:$(pwd)/gradle-${GRADLE_VERSION}/bin
            
            # Generate wrapper
            gradle wrapper --gradle-version ${GRADLE_VERSION}
            
            # Clean up
            rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip
          fi
          
          # Make gradlew executable
          chmod +x gradlew 2>/dev/null || true
      
      - name: Verify gradlew exists
        run: |
          if [ -f "gradlew" ]; then
            echo "✅ gradlew found"
            ./gradlew --version
          else
            echo "❌ gradlew still not found, creating manually..."
            # Create minimal gradlew script
            cat > gradlew << 'EOF'
            #!/bin/sh
            GRADLE_VERSION="${{ steps.gradle-version.outputs.gradle_version }}"
            GRADLE_HOME="$HOME/.gradle/wrapper/dists/gradle-${GRADLE_VERSION}-bin"
            if [ ! -d "$GRADLE_HOME" ]; then
              echo "Downloading Gradle ${GRADLE_VERSION}..."
              mkdir -p "$GRADLE_HOME"
              wget -q -O gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
              unzip -q gradle.zip -d "$GRADLE_HOME"
              mv "$GRADLE_HOME/gradle-${GRADLE_VERSION}"/* "$GRADLE_HOME/"
              rm gradle.zip
            fi
            exec "$GRADLE_HOME/bin/gradle" "$@"
            EOF
            chmod +x gradlew
            ./gradlew --version
          fi
      
      - name: Create temporary settings for dependency resolution
        run: |
          # Ensure settings.gradle exists with proper repositories
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            cat > settings.gradle << 'EOF'
            dependencyResolutionManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            rootProject.name = "temp-project"
            EOF
            echo "Created settings.gradle"
          fi
          
          # Add repositories if missing
          if [ -f "settings.gradle" ]; then
            if ! grep -q "google()" settings.gradle; then
              echo -e "\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}" >> settings.gradle
            fi
          fi
      
      - name: Download dependencies
        id: download-deps
        run: |
          # Download dependencies using multiple approaches
          echo "Downloading Gradle dependencies..."
          
          # Approach 1: Just run a simple task
          ./gradlew help --no-daemon || true
          
          # Approach 2: Download all configurations
          for config in compileClasspath runtimeClasspath implementation testCompileClasspath testRuntimeClasspath androidTestCompileClasspath debugCompileClasspath releaseCompileClasspath; do
            echo "Downloading configuration: $config"
            ./gradlew dependencies --configuration $config --no-daemon 2>/dev/null || true
          done
          
          # Approach 3: Use dependency insight for common libraries
          ./gradlew dependencyInsight --dependency junit --no-daemon 2>/dev/null || true
          
          # Approach 4: Try to resolve all dependencies
          ./gradlew resolveAllDependencies --no-daemon 2>/dev/null || true
          
          # Approach 5: Download plugin dependencies
          ./gradlew build -x test -x compileJava -x compileKotlin -x compileGroovy --no-daemon --continue 2>/dev/null || true
          
          echo "Dependency download complete"
          
          # Show cache size
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Gradle cache size:"
            du -sh $HOME/.gradle/caches
          fi
      
      - name: Prepare dependencies for commit
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy wrapper files
          cp -r gradle .gradle-dependencies/ 2>/dev/null || echo "No gradle wrapper dir"
          cp gradlew .gradle-dependencies/ 2>/dev/null || echo "No gradlew"
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy build configuration
          find . -maxdepth 2 \( -name "build.gradle*" -o -name "settings.gradle*" -o -name "gradle.properties" \) -exec cp {} .gradle-dependencies/ \; 2>/dev/null || true
          
          # Copy Gradle caches
          if [ -d "$HOME/.gradle/caches" ]; then
            mkdir -p .gradle-dependencies/.gradle
            echo "Copying caches (this may take a while)..."
            cp -r $HOME/.gradle/caches .gradle-dependencies/.gradle/
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/
          fi
          
          # Create restore script
          cat > .gradle-dependencies/restore-dependencies.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          
          echo "=== Restoring Gradle Dependencies ==="
          
          # Restore wrapper
          if [ -d "$SCRIPT_DIR/gradle" ]; then
            cp -r "$SCRIPT_DIR/gradle" "$REPO_ROOT/" 2>/dev/null
            echo "✓ Restored gradle wrapper directory"
          fi
          
          if [ -f "$SCRIPT_DIR/gradlew" ]; then
            cp "$SCRIPT_DIR/gradlew" "$REPO_ROOT/"
            chmod +x "$REPO_ROOT/gradlew"
            echo "✓ Restored gradlew"
          fi
          
          # Restore build files
          for file in "$SCRIPT_DIR"/build.gradle* "$SCRIPT_DIR"/settings.gradle* "$SCRIPT_DIR"/gradle.properties; do
            if [ -f "$file" ]; then
              cp "$file" "$REPO_ROOT/" 2>/dev/null
            fi
          done
          
          # Restore Gradle caches
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"
            echo "✓ Restored Gradle caches ($(du -sh $HOME/.gradle/caches | cut -f1))"
          fi
          
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"
            echo "✓ Restored Gradle wrapper distributions"
          fi
          
          echo "=== Restoration Complete ==="
          echo "You can now run: ./gradlew build"
          EOF
          
          chmod +x .gradle-dependencies/restore-dependencies.sh
          
          # Create README
          cat > .gradle-dependencies/README.md << 'EOF'
          # Gradle Dependencies Cache
          
          This directory contains pre-downloaded Gradle dependencies.
          
          ## Quick Restore
          ```bash
          cd .gradle-dependencies
          ./restore-dependencies.sh
          cd ..
