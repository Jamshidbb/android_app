name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Backup and replace build files
        run: |
          # Backup original files
          if [ -f "build.gradle.kts" ]; then
            cp build.gradle.kts build.gradle.kts.original
          fi
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.original
          fi
          
          # Create settings.gradle.kts with proper plugin management
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          EOF
          
          # Create app/build.gradle.kts with proper configuration
          mkdir -p app
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.temp"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.temp"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
          
          echo "Created temporary build files"
      
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            GRADLE_VERSION="8.5"
            wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle-${GRADLE_VERSION}-bin.zip
            ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
            rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip
          fi
          chmod +x gradlew
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Download dependencies
        run: |
          # Make gradlew executable
          chmod +x gradlew
          
          # Download dependencies without building
          ./gradlew --no-daemon dependencies || true
          
          # Force download of all configurations
          ./gradlew --no-daemon downloadDependencies || true
          
          echo "Dependency download completed"
          
          # Show cache size
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
          fi
      
      - name: Package dependencies
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy wrapper
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy build files for reference
          cp settings.gradle.kts .gradle-dependencies/settings.gradle.kts.working 2>/dev/null || true
          cp build.gradle.kts .gradle-dependencies/build.gradle.kts.working 2>/dev/null || true
          cp app/build.gradle.kts .gradle-dependencies/app.build.gradle.kts.working 2>/dev/null || true
          
          # Copy original files
          cp build.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          cp settings.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          
          # Copy caches
          if [ -d "$HOME/.gradle/caches" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/caches .gradle-dependencies/.gradle/ 2>/dev/null || true
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/ 2>/dev/null || true
          fi
          
          # Create restore script
          cat > .gradle-dependencies/restore.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          echo "Restoring Gradle dependencies..."
          if [ -d "$SCRIPT_DIR/gradle" ]; then cp -r "$SCRIPT_DIR/gradle" "$REPO_ROOT/"; fi
          if [ -f "$SCRIPT_DIR/gradlew" ]; then cp "$SCRIPT_DIR/gradlew" "$REPO_ROOT/" && chmod +x "$REPO_ROOT/gradlew"; fi
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then mkdir -p "$HOME/.gradle" && cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"; fi
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then mkdir -p "$HOME/.gradle" && cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"; fi
          echo "Restore complete"
          EOF
          chmod +x .gradle-dependencies/restore.sh
          
          # Create restore instructions
          cat > .gradle-dependencies/README.md << 'EOF'
          # Gradle Dependencies Cache
          
          ## Restore
          ```bash
          .gradle-dependencies/restore.sh
