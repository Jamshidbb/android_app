name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2.1'
      
      - name: Create temporary build files
        run: |
          # Backup original files
          [ -f "build.gradle.kts" ] && cp build.gradle.kts build.gradle.kts.original
          [ -f "settings.gradle.kts" ] && cp settings.gradle.kts settings.gradle.kts.original
          
          # Create settings.gradle.kts
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
          }
          EOF
          
          # Create app/build.gradle.kts
          mkdir -p app
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.temp"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.temp"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
      
      - name: Download dependencies
        run: |
          gradle --no-daemon dependencies || true
          gradle --no-daemon build --dry-run || true
          echo "Dependency download completed"
      
      - name: Copy dependencies to repo (excluding super large files)
        run: |
          # Create gradle-cache directory in repo root
          mkdir -p gradle-cache
          
          # Copy Gradle caches but exclude files > 100MB
          if [ -d "$HOME/.gradle/caches" ]; then
            rsync -av --exclude='*.lock' \
                      --exclude='tmp/' \
                      --exclude='journal-*' \
                      --exclude='fileHashes.bin' \
                      --exclude='fileSnapshots.bin' \
                      --exclude='resourceHashesCache.bin' \
                      --exclude='buildHistory.bin' \
                      --exclude='outputFiles.bin' \
                      --exclude='gradle-api-*.jar' \
                      --exclude='instrumented-kotlin-compiler-*.jar' \
                      --exclude='kotlin-compiler-embeddable-*.jar' \
                      --exclude='kotlin-daemon-client-*.jar' \
                      $HOME/.gradle/caches/ gradle-cache/caches/
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            cp -r $HOME/.gradle/wrapper gradle-cache/
          fi
          
          # Create restore script that will download large files on demand
          cat > gradle-cache/restore.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "Restoring Gradle dependencies from repo..."
          
          if [ -d "$SCRIPT_DIR/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/caches" "$HOME/.gradle/"
            echo "✓ Restored caches"
          fi
          
          if [ -d "$SCRIPT_DIR/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/wrapper" "$HOME/.gradle/"
            echo "✓ Restored wrapper"
          fi
          
          echo "✓ Restore complete"
          echo ""
          echo "Note: Some large JAR files will be downloaded on first build"
          echo "Run './gradlew build' to download missing files"
          EOF
          chmod +x gradle-cache/restore.sh
          
          # Create restore script at root
          cat > restore-gradle-cache.sh << 'EOF'
          #!/bin/bash
          if [ -d "gradle-cache" ]; then
            gradle-cache/restore.sh
          else
            echo "Error: gradle-cache directory not found"
          fi
          EOF
          chmod +x restore-gradle-cache.sh
          
          echo "Dependencies copied to gradle-cache/"
          echo "Size: $(du -sh gradle-cache 2>/dev/null | cut -f1)"
      
      - name: Restore original build files
        run: |
          [ -f "build.gradle.kts.original" ] && mv build.gradle.kts.original build.gradle.kts
          [ -f "settings.gradle.kts.original" ] && mv settings.gradle.kts.original settings.gradle.kts
          rm -rf app 2>/dev/null || true
      
      - name: Prepare .gitignore
        run: |
          # Remove .gitignore entries that exclude our scripts
          if [ -f ".gitignore" ]; then
            sed -i '/restore-gradle-cache.sh/d' .gitignore
            sed -i '/^gradle-cache\/$/d' .gitignore
          fi
          
          # Add proper .gitignore for cache
          cat > .gitignore.tmp << 'EOF'
          # Gradle build outputs
          .gradle/
          build/
          app/build/
          
          # Local files
          local.properties
          *.iml
          .idea/
          
          # Keystore files
          *.jks
          *.keystore
          EOF
          
          # Merge with existing .gitignore if it exists
          if [ -f ".gitignore" ]; then
            cat .gitignore >> .gitignore.tmp
          fi
          sort -u .gitignore.tmp > .gitignore
          rm .gitignore.tmp
      
      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add files (force add to override .gitignore)
          git add -f gradle-cache/
          git add -f restore-gradle-cache.sh
          git add .gitignore
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Gradle dependencies cache (excluding super large files) [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "✓ Pushed to repository"
          fi
      
      - name: Create alternative download script for missing files
        run: |
          cat > download-missing-dependencies.sh << 'EOF'
          #!/bin/bash
          echo "Downloading missing Gradle dependencies..."
          
          # Generate wrapper if missing
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          
          # Download dependencies
          ./gradlew dependencies
          
          echo "✓ Missing dependencies downloaded"
          EOF
          chmod +x download-missing-dependencies.sh
          
          git add download-missing-dependencies.sh
          git commit -m "Add missing dependencies download script [skip ci]" || true
          git push origin ${{ github.ref_name }} || true
      
      - name: Summary
        run: |
          echo "=============================================="
          echo "✅ DEPENDENCIES PUSHED TO REPOSITORY"
          echo "=============================================="
          echo ""
          echo "What was committed:"
          echo "  - Most Gradle caches (< 100MB files)"
          echo "  - Restore scripts"
          echo ""
          echo "What was NOT committed (exceeds 100MB limit):"
          echo "  - gradle-api-9.2.1.jar (178MB)"
          echo "  - instrumented-kotlin-compiler-embeddable-1.9.20.jar (157MB)"
          echo ""
          echo "To restore on a new machine:"
          echo "  1. Run: ./restore-gradle-cache.sh"
          echo "  2. Run: ./download-missing-dependencies.sh"
          echo ""
          echo "Or simply run: ./gradlew build"
          echo "(Gradle will download missing files automatically)"
          echo "=============================================="
