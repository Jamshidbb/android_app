name: Gradle Dependencies

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/gradle/libs.versions.toml'
      - '**/gradle/wrapper/gradle-wrapper.properties'
  workflow_dispatch:  # Allow manual trigger

jobs:
  download-and-push-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'  # Adjust to your project's Java version
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper  # or specify version like '8.5'
      
      - name: Download all dependencies
        run: |
          # Make gradlew executable
          chmod +x gradlew
          
          # Download all dependencies
          ./gradlew build --dry-run
          ./gradlew dependencies
          
          # Download specific configurations
          ./gradlew downloadDependencies 2>/dev/null || true
          
          # Download dependencies for all subprojects if it's a multi-module project
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            ./gradlew dependencyInsight --all
          fi
      
      - name: Collect Gradle wrapper files
        run: |
          echo "Collecting Gradle wrapper files..."
          
          # Create directory structure
          mkdir -p gradle-dependency-cache/gradle/wrapper
          
          # Find and copy all gradle-wrapper.properties files
          echo "=== GRADLE WRAPPER PROPERTIES ===" > gradle-dependency-cache/wrapper-info.txt
          
          # Copy wrapper properties from project root
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            cp gradle/wrapper/gradle-wrapper.properties gradle-dependency-cache/gradle/wrapper/
            echo "Root wrapper properties:" >> gradle-dependency-cache/wrapper-info.txt
            cat gradle/wrapper/gradle-wrapper.properties >> gradle-dependency-cache/wrapper-info.txt
            echo "" >> gradle-dependency-cache/wrapper-info.txt
          fi
          
          # Find wrapper properties in all subdirectories
          find . -name "gradle-wrapper.properties" -not -path "./gradle-dependency-cache/*" | while read wrapper_props; do
            # Get relative path
            rel_path=$(dirname "$wrapper_props")
            target_dir="gradle-dependency-cache/$rel_path"
            mkdir -p "$target_dir"
            cp "$wrapper_props" "$target_dir/"
            
            echo "Found wrapper at: $rel_path" >> gradle-dependency-cache/wrapper-info.txt
            echo "Contents:" >> gradle-dependency-cache/wrapper-info.txt
            cat "$wrapper_props" >> gradle-dependency-cache/wrapper-info.txt
            echo "---" >> gradle-dependency-cache/wrapper-info.txt
          done
      
      - name: Download Gradle distributions
        run: |
          echo "Downloading Gradle distributions..."
          mkdir -p gradle-dependency-cache/gradle-distributions
          
          # Extract Gradle version from wrapper properties
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            GRADLE_VERSION=$(grep "distributionUrl" gradle/wrapper/gradle-wrapper.properties | grep -oP 'gradle-\K[0-9.]+' | head -1)
            
            if [ ! -z "$GRADLE_VERSION" ]; then
              echo "Downloading Gradle $GRADLE_VERSION distribution..."
              
              # Download the distribution
              wget -O "gradle-dependency-cache/gradle-distributions/gradle-${GRADLE_VERSION}-bin.zip" \
                "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" || \
              wget -O "gradle-dependency-cache/gradle-distributions/gradle-${GRADLE_VERSION}-bin.zip" \
                "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-all.zip"
              
              # Also download checksum files
              wget -O "gradle-dependency-cache/gradle-distributions/gradle-${GRADLE_VERSION}-bin.zip.sha256" \
                "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip.sha256" 2>/dev/null || true
              
              echo "Gradle version: $GRADLE_VERSION" >> gradle-dependency-cache/wrapper-info.txt
            fi
          fi
          
          # Also save the wrapper JAR and scripts
          if [ -d "gradle/wrapper" ]; then
            cp -r gradle/wrapper gradle-dependency-cache/gradle-wrapper-backup/
          fi
      
      - name: Create dependency cache directory
        run: |
          mkdir -p gradle-dependency-cache/caches
          mkdir -p gradle-dependency-cache/wrapper
          mkdir -p gradle-dependency-cache/init.d
      
      - name: Copy Gradle caches
        run: |
          # Copy the entire Gradle cache
          if [ -d ~/.gradle/caches ]; then
            cp -r ~/.gradle/caches/* gradle-dependency-cache/caches/
          fi
          
          # Copy Gradle wrapper distribution cache
          if [ -d ~/.gradle/wrapper/dists ]; then
            cp -r ~/.gradle/wrapper/dists gradle-dependency-cache/wrapper/
          fi
          
          # Copy Gradle user home caches
          if [ -d ~/.gradle/caches/journal ]; then
            mkdir -p gradle-dependency-cache/caches/journal
            cp -r ~/.gradle/caches/journal/* gradle-dependency-cache/caches/journal/
          fi
          
          # Create metadata file
          echo "=== CACHE METADATA ===" > gradle-dependency-cache/cache-info.txt
          echo "Dependencies cached on: $(date)" >> gradle-dependency-cache/cache-info.txt
          echo "Gradle version: $(./gradlew --version | grep 'Gradle:' | awk '{print $2}')" >> gradle-dependency-cache/cache-info.txt
          echo "Java version: $(java -version 2>&1 | head -n 1)" >> gradle-dependency-cache/cache-info.txt
          echo "OS: $(uname -a)" >> gradle-dependency-cache/cache-info.txt
          
          # Count dependencies
          echo "Total JAR files: $(find ~/.gradle/caches -name "*.jar" 2>/dev/null | wc -l)" >> gradle-dependency-cache/cache-info.txt
          echo "Total cache size: $(du -sh ~/.gradle/caches 2>/dev/null | cut -f1)" >> gradle-dependency-cache/cache-info.txt
      
      - name: Generate comprehensive dependency list
        run: |
          # Generate full dependency report
          ./gradlew dependencies > gradle-dependency-cache/full-dependency-list.txt
          ./gradlew build --dry-run > gradle-dependency-cache/build-dry-run.log 2>&1
          
          # Generate dependency insight for all configurations
          ./gradlew dependencyInsight --all > gradle-dependency-cache/dependency-insight.txt 2>&1 || true
          
          # Generate dependency tree in different formats
          ./gradlew dependencies --configuration compileClasspath > gradle-dependency-cache/compile-deps.txt
          ./gradlew dependencies --configuration runtimeClasspath > gradle-dependency-cache/runtime-deps.txt
          ./gradlew dependencies --configuration testCompileClasspath > gradle-dependency-cache/test-deps.txt 2>/dev/null || true
          
          # List all downloaded JAR files
          find ~/.gradle/caches -name "*.jar" 2>/dev/null | sort > gradle-dependency-cache/all-jars-list.txt
          
          # Extract Maven coordinates from cache paths
          echo "=== ARTIFACT COORDINATES ===" > gradle-dependency-cache/artifact-coordinates.txt
          find ~/.gradle/caches/modules-2/files-2.1 -type d -name "*.jar" 2>/dev/null | while read jar; do
            echo "$jar" | grep -oP 'files-2.1/\K[^/]+/[^/]+/[^/]+' >> gradle-dependency-cache/artifact-coordinates.txt
          done | sort -u
      
      - name: Create initialization script for local loading
        run: |
          cat > gradle-dependency-cache/init.gradle << 'EOF'
          // Init script to configure Gradle to use local cache
          
          settingsEvaluated { settings ->
              println "=== Using local Gradle dependency cache ==="
              
              // Configure build cache
              buildCache {
                  local {
                      directory = file("${settings.rootDir}/.gradle-cache/caches/build-cache-1")
                      enabled = true
                  }
              }
              
              // Configure dependency resolution
              dependencyResolutionManagement {
                  repositories {
                      // Use local cache first
                      mavenLocal()
                      // Fall back to standard repositories
                      mavenCentral()
                      google()
                  }
              }
          }
          
          gradle.projectsLoaded {
              println "Local cache directory: ${gradle.gradleUserHomeDir}/caches"
          }
          EOF
          
          cat > gradle-dependency-cache/load-cache.sh << 'EOF'
          #!/bin/bash
          # Script to load cached dependencies
          
          echo "Loading Gradle cache from repository..."
          
          # Create symlinks or copy cache
          if [ -d ".gradle-cache/caches" ]; then
              mkdir -p ~/.gradle
              
              # Backup existing cache if needed
              if [ -d ~/.gradle/caches ] && [ ! -L ~/.gradle/caches ]; then
                  echo "Backing up existing Gradle cache..."
                  mv ~/.gradle/caches ~/.gradle/caches.backup.$(date +%s)
              fi
              
              # Create symlink to use the cached version
              ln -sfn "$(pwd)/.gradle-cache/caches" ~/.gradle/caches
              echo "Created symlink to cached dependencies"
              
              # Restore wrapper distributions
              if [ -d ".gradle-cache/wrapper/dists" ]; then
                  mkdir -p ~/.gradle/wrapper
                  ln -sfn "$(pwd)/.gradle-cache/wrapper/dists" ~/.gradle/wrapper/dists
                  echo "Created symlink to cached Gradle wrapper distributions"
              fi
              
              echo "Cache loaded successfully!"
              echo "Cache info:"
              cat .gradle-cache/cache-info.txt
          else
              echo "Cache directory not found. Please ensure you've checked out the cache branch."
              exit 1
          fi
          EOF
          
          chmod +x gradle-dependency-cache/load-cache.sh
      
      - name: Upload to repository artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gradle-dependency-cache
          path: gradle-dependency-cache/
          retention-days: 90
      
      - name: Commit and push to cache branch
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create or switch to cache branch
          git checkout -b gradle-dependency-cache 2>/dev/null || git checkout gradle-dependency-cache
          
          # Create directory structure
          mkdir -p .gradle-cache/gradle/wrapper
          
          # Move cache to .gradle-cache directory
          cp -r gradle-dependency-cache/* .gradle-cache/
          
          # Remove old files and add new ones
          git rm -rf .gradle-cache 2>/dev/null || true
          git add .gradle-cache/
          
          # Also add wrapper files to root if needed
          if [ -d "gradle-dependency-cache/gradle/wrapper" ]; then
            mkdir -p gradle/wrapper
            cp gradle-dependency-cache/gradle/wrapper/* gradle/wrapper/ 2>/dev/null || true
            git add gradle/wrapper/
          fi
          
          # Add load script to root for convenience
          cp gradle-dependency-cache/load-cache.sh ./load-gradle-cache.sh
          chmod +x ./load-gradle-cache.sh
          git add load-gradle-cache.sh
          
          # Commit changes
          git commit -m "Update Gradle dependency cache and wrapper properties - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          
          # Push to remote
          git push origin gradle-dependency-cache --force
