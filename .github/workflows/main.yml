name: Gradle Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Generate Gradle wrapper
        run: |
          # Create gradle wrapper directory
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar
          cd gradle/wrapper
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          cd ../..
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          set -e
          # Determine Java command
          if [ -n "$JAVA_HOME" ] ; then
              JAVA_CMD="$JAVA_HOME/bin/java"
          else
              JAVA_CMD="java"
          fi
          # Run Gradle
          exec $JAVA_CMD -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          
          # Make gradlew executable
          chmod +x gradlew
          
          echo "✅ Gradle wrapper created"
      
      - name: Verify gradlew works
        run: |
          ./gradlew --version
      
      - name: Download dependencies
        run: |
          # Download dependencies without building
          ./gradlew build --dry-run 2>&1 || true
          ./gradlew dependencies 2>&1 || true
      
      - name: Prepare cache (dependencies only)
        run: |
          mkdir -p offline-cache
          
          # Copy dependency modules
          if [ -d ~/.gradle/caches/modules-2 ]; then
            cp -r ~/.gradle/caches/modules-2 offline-cache/
            echo "✅ Copied modules cache"
          fi
          
          # Copy Android transforms cache
          if [ -d ~/.gradle/caches/transforms-3 ]; then
            cp -r ~/.gradle/caches/transforms-3 offline-cache/
            echo "✅ Copied transforms cache"
          fi
          
          # Copy Kotlin DSL cache
          if [ -d ~/.gradle/caches/kotlin-dsl ]; then
            cp -r ~/.gradle/caches/kotlin-dsl offline-cache/
            echo "✅ Copied Kotlin DSL cache"
          fi
          
          # Create install script
          cat > offline-cache/install.sh << 'INSTALL'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          mkdir -p ~/.gradle/caches
          
          if [ -d "$SCRIPT_DIR/modules-2" ]; then
            ln -sfn "$SCRIPT_DIR/modules-2" ~/.gradle/caches/modules-2
            echo "✓ Dependencies linked"
          fi
          
          if [ -d "$SCRIPT_DIR/transforms-3" ]; then
            ln -sfn "$SCRIPT_DIR/transforms-3" ~/.gradle/caches/transforms-3
            echo "✓ Transforms linked"
          fi
          
          if [ -d "$SCRIPT_DIR/kotlin-dsl" ]; then
            ln -sfn "$SCRIPT_DIR/kotlin-dsl" ~/.gradle/caches/kotlin-dsl
            echo "✓ Kotlin DSL linked"
          fi
          
          echo "Cache installed successfully"
          INSTALL
          
          chmod +x offline-cache/install.sh
          
          echo "Cache size: $(du -sh offline-cache 2>/dev/null)"
      
      - name: Push to branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Delete old branch if exists
          git push origin --delete gradle-cache 2>/dev/null || true
          
          # Create new branch
          git checkout --orphan gradle-cache
          git rm -rf . 2>/dev/null || true
          
          # Copy cache
          cp -r offline-cache/* .
          rm -rf offline-cache
          
          # Create README
          cat > README.md << 'README'
          # Gradle Dependency Cache
          
          ## Installation
          
          ```bash
          # 1. Checkout this branch
          git fetch origin gradle-cache
          git checkout gradle-cache
          
          # 2. Install cache
          ./install.sh
          
          # 3. Return to your branch
          git checkout -
          
          # 4. Build offline
          ./gradlew build --offline
