name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Get Gradle Wrapper version
        id: gradle-version
        run: |
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            DIST_URL=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2)
            GRADLE_VERSION=$(echo $DIST_URL | grep -oP 'gradle-\K[0-9.]+')
            echo "gradle_version=$GRADLE_VERSION" >> $GITHUB_OUTPUT
            echo "Found Gradle version: $GRADLE_VERSION"
          else
            echo "gradle_version=8.5" >> $GITHUB_OUTPUT
          fi
      
      - name: Install Gradle if no wrapper exists
        run: |
          if [ ! -f "gradlew" ]; then
            GRADLE_VERSION="${{ steps.gradle-version.outputs.gradle_version }}"
            wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle-${GRADLE_VERSION}-bin.zip
            export PATH=$PATH:$(pwd)/gradle-${GRADLE_VERSION}/bin
            gradle wrapper --gradle-version ${GRADLE_VERSION}
            rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip
          fi
          chmod +x gradlew 2>/dev/null || true
      
      - name: Fix settings.gradle for Android plugin resolution
        run: |
          # Backup original settings.gradle.kts if it exists
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.bak
          fi
          
          # Create a temporary settings.gradle that includes Google repos
          cat > settings.gradle.temp << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Use the temp file if original doesn't have proper repos
          if [ -f "settings.gradle.kts" ]; then
            if ! grep -q "google()" settings.gradle.kts; then
              echo "⚠️ settings.gradle.kts missing Google repo, using fixed version"
              cp settings.gradle.temp settings.gradle
            fi
          elif [ -f "settings.gradle" ]; then
            if ! grep -q "google()" settings.gradle; then
              echo "⚠️ settings.gradle missing Google repo, using fixed version"
              cp settings.gradle.temp settings.gradle
            fi
          else
            echo "📝 No settings file found, creating one"
            cp settings.gradle.temp settings.gradle
          fi
      
      - name: Create temporary build.gradle for dependency resolution
        run: |
          # Create a minimal build.gradle that can resolve Android dependencies
          cat > build.gradle.temp << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:9.0.0'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Use temp build file if needed
          if [ -f "build.gradle.kts" ]; then
            if grep -q "com.android.application" build.gradle.kts; then
              echo "📝 Android project detected, will use original build file"
            fi
          fi
      
      - name: Download Android plugin and dependencies
        id: download-deps
        run: |
          # First, download the Android plugin explicitly
          echo "Downloading Android Gradle plugin..."
          ./gradlew --no-daemon -q help 2>&1 | true
          
          # Force download of Android plugin
          ./gradlew --no-daemon buildscript -q 2>&1 | true
          
          # Download all possible dependency configurations
          echo "Downloading dependencies..."
          
          # Common Android configurations
          for config in classpath compileClasspath runtimeClasspath \
                        implementation api testImplementation androidTestImplementation \
                        debugCompileClasspath releaseCompileClasspath; do
            echo "Downloading $config..."
            ./gradlew --no-daemon dependencies --configuration $config 2>&1 | grep -v "FAILURE" | true
          done
          
          # Try to resolve all dependencies without full build
          ./gradlew --no-daemon resolveConfigurations 2>&1 | true
          
          # Download Kotlin plugin if used
          ./gradlew --no-daemon kotlinDependencies 2>&1 | true
          
          echo "✅ Dependency download completed"
          
          # Show cache info
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Gradle cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
            echo "Modules cached: $(find $HOME/.gradle/caches/modules-2/files-2.1 -type f -name "*.jar" 2>/dev/null | wc -l) jar files"
          fi
      
      - name: Prepare dependencies for packaging
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy wrapper
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy configuration files
          for file in build.gradle build.gradle.kts settings.gradle settings.gradle.kts gradle.properties; do
            [ -f "$file" ] && cp "$file" .gradle-dependencies/
          done
          
          # Copy Gradle caches (compress to save space)
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "📦 Packaging Gradle caches..."
            mkdir -p .gradle-dependencies/.gradle
            # Only copy modules and wrapper caches, skip large temporary files
            cp -r $HOME/.gradle/caches/modules-2 .gradle-dependencies/.gradle/caches/ 2>/dev/null || true
            cp -r $HOME/.gradle/caches/transforms-* .gradle-dependencies/.gradle/caches/ 2>/dev/null || true
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/
          fi
          
          # Create enhanced restore script
          cat > .gradle-dependencies/restore-dependencies.sh << 'RESTORE_SCRIPT'
          #!/bin/bash
          set -e
          
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          
          echo "========================================="
          echo "  Restoring Gradle Dependencies"
          echo "========================================="
          
          # Restore wrapper files
          echo "📁 Restoring Gradle wrapper..."
          if [ -d "$SCRIPT_DIR/gradle" ]; then
            cp -r "$SCRIPT_DIR/gradle" "$REPO_ROOT/" 2>/dev/null
            echo "  ✅ gradle/ directory"
          fi
          
          if [ -f "$SCRIPT_DIR/gradlew" ]; then
            cp "$SCRIPT_DIR/gradlew" "$REPO_ROOT/"
            chmod +x "$REPO_ROOT/gradlew"
            echo "  ✅ gradlew script"
          fi
          
          # Restore config files
          echo "📁 Restoring configuration files..."
          for file in build.gradle build.gradle.kts settings.gradle settings.gradle.kts gradle.properties; do
            [ -f "$SCRIPT_DIR/$file" ] && cp "$SCRIPT_DIR/$file" "$REPO_ROOT/" && echo "  ✅ $file"
          done
          
          # Restore caches
          echo "📁 Restoring Gradle caches..."
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"
            CACHE_SIZE=$(du -sh "$HOME/.gradle/caches" 2>/dev/null | cut -f1)
            echo "  ✅ Gradle caches restored ($CACHE_SIZE)"
          fi
          
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"
            echo "  ✅ Gradle wrapper distributions"
          fi
          
          echo "========================================="
          echo "✅ Restoration complete!"
          echo "========================================="
          echo ""
          echo "You can now build offline:"
          echo "  cd $REPO_ROOT"
          echo "  ./gradlew build --offline"
          echo ""
          RESTORE_SCRIPT
          
          chmod +x .gradle-dependencies/restore-dependencies.sh
          
          # Create README
          cat > .gradle-dependencies/README.md << 'README'
          # Gradle Dependencies Cache
          
          This contains pre-downloaded dependencies including Android plugins.
          
          ## Quick Restore
          ```bash
          .gradle-dependencies/restore-dependencies.sh
