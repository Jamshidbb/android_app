name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Backup and replace build files
        run: |
          # Backup original files
          if [ -f "build.gradle.kts" ]; then
            cp build.gradle.kts build.gradle.kts.original
          fi
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.original
          fi
          
          # Create a working settings.gradle.kts with proper repositories
          cat > settings.gradle.kts << 'SETTINGS_EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          SETTINGS_EOF
          
          # Create a working build.gradle.kts
          cat > build.gradle.kts << 'BUILD_EOF'
          plugins {
              id("com.android.application") version "9.0.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.0" apply false
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          tasks.register("downloadDependencies") {
              doLast {
                  println("Dependencies downloaded successfully")
              }
          }
          
          tasks.register("resolveAllDependencies") {
              doLast {
                  configurations.forEach { config ->
                      if (config.isCanBeResolved) {
                          try {
                              config.files
                          } catch (e: Exception) {
                              println("Could not resolve ${config.name}: ${e.message}")
                          }
                      }
                  }
              }
          }
          BUILD_EOF
          
          # Create minimal app/build.gradle.kts if needed
          mkdir -p app
          if [ ! -f "app/build.gradle.kts" ]; then
            cat > app/build.gradle.kts << 'APP_EOF'
            plugins {
                id("com.android.application")
                id("org.jetbrains.kotlin.android")
            }
            
            android {
                namespace = "com.example.temp"
                compileSdk = 34
                
                defaultConfig {
                    applicationId = "com.example.temp"
                    minSdk = 24
                    targetSdk = 34
                    versionCode = 1
                    versionName = "1.0"
                }
            }
            
            dependencies {
                implementation("androidx.core:core-ktx:1.12.0")
                implementation("androidx.appcompat:appcompat:1.6.1")
                implementation("com.google.android.material:material:1.11.0")
            }
            APP_EOF
          fi
          
          echo "✅ Created temporary build files with proper Android plugin configuration"
      
      - name: Generate Gradle wrapper if needed
        run: |
          if [ ! -f "gradlew" ]; then
            GRADLE_VERSION="9.2.1"
            wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle-${GRADLE_VERSION}-bin.zip
            ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
            rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip
          fi
          chmod +x gradlew
      
      - name: Download all dependencies
        run: |
          echo "📦 Downloading Android plugin and dependencies..."
          
          # Step 1: Download plugins
          ./gradlew --no-daemon --info buildscript 2>&1 | grep -E "(Download|BUILD)" || true
          
          # Step 2: Download dependencies for all configurations
          ./gradlew --no-daemon resolveAllDependencies 2>&1 || true
          
          # Step 3: Force download common Android dependencies
          ./gradlew --no-daemon dependencies --configuration classpath 2>&1 || true
          ./gradlew --no-daemon dependencies --configuration compileClasspath 2>&1 || true
          ./gradlew --no-daemon dependencies --configuration runtimeClasspath 2>&1 || true
          ./gradlew --no-daemon dependencies --configuration implementation 2>&1 || true
          
          # Step 4: Try to build (will download deps but likely fail due to missing Android SDK components)
          ./gradlew --no-daemon --continue build -x test -x lint 2>&1 || true
          
          echo "✅ Dependency download process completed"
          
          # Show cache statistics
          if [ -d "$HOME/.gradle/caches" ]; then
            echo ""
            echo "📊 Gradle Cache Statistics:"
            echo "  Total size: $(du -sh $HOME/.gradle/caches | cut -f1)"
            echo "  Modules cached: $(find $HOME/.gradle/caches/modules-2/files-2.1 -type f -name "*.jar" 2>/dev/null | wc -l) JAR files"
          fi
      
      - name: Verify Android plugin was downloaded
        run: |
          if find $HOME/.gradle/caches -name "*android*gradle*plugin*" -type f 2>/dev/null | grep -q .; then
            echo "✅ Android Gradle plugin successfully downloaded"
          else
            echo "⚠️ Android plugin not found in cache"
          fi
      
      - name: Package dependencies for distribution
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy wrapper
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy the working build files
          cp settings.gradle.kts .gradle-dependencies/settings.gradle.kts.working 2>/dev/null || true
          cp build.gradle.kts .gradle-dependencies/build.gradle.kts.working 2>/dev/null || true
          
          # Copy original files if they exist
          cp build.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          cp settings.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          
          # Copy Gradle caches
          if [ -d "$HOME/.gradle/caches" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/caches/modules-2 .gradle-dependencies/.gradle/caches/ 2>/dev/null || true
            cp -r $HOME/.gradle/caches/transforms-3 .gradle-dependencies/.gradle/caches/ 2>/dev/null || true
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/
          fi
          
          # Create restore script
          cat > .gradle-dependencies/restore.sh << 'RESTORE_EOF'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          echo "Restoring Gradle dependencies..."
          if [ -d "$SCRIPT_DIR/gradle" ]; then
            cp -r "$SCRIPT_DIR/gradle" "$REPO_ROOT/"
          fi
          if [ -f "$SCRIPT_DIR/gradlew" ]; then
            cp "$SCRIPT_DIR/gradlew" "$REPO_ROOT/"
            chmod +x "$REPO_ROOT/gradlew"
          fi
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"
          fi
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"
          fi
          echo "Restore complete. Run: ./gradlew build --offline"
          RESTORE_EOF
          
          chmod +x .gradle-dependencies/restore.sh
          
          # Create README
          cat > .gradle-dependencies/README.md << 'README_EOF'
          # Gradle Dependencies Cache
          
          Contains pre-downloaded Android Gradle Plugin and dependencies.
          
          ## Restore
          ```bash
          .gradle-dependencies/restore.sh
