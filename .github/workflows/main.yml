name: Android Project Setup and Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  create-and-build-android-app:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # Step 2: Set up JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # Step 3: Set up Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    # Step 4: Cache Gradle dependencies
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # Step 5: Create Android project if it doesn't exist
    - name: Create Android project
      run: |
        # Check if project already exists
        if [ -f "app/build.gradle" ] || [ -f "app/build.gradle.kts" ]; then
            echo "✅ Android project already exists. Skipping creation."
            exit 0
        fi
        
        echo "📱 Creating new Android project with latest template..."
        
        # Create directory structure
        mkdir -p app/src/main/java/com/example/myapplication
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p gradle/wrapper
        
        # Create settings.gradle.kts
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyApplication"
        include(":app")
        EOF
        
        # Create build.gradle.kts (project level)
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        EOF
        
        # Create app/build.gradle.kts
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.example.myapplication"
            compileSdk = 34
        
            defaultConfig {
                applicationId = "com.example.myapplication"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
        
                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
            }
        
            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_1_8
                targetCompatibility = JavaVersion.VERSION_1_8
            }
            kotlinOptions {
                jvmTarget = "1.8"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")
            testImplementation("junit:junit:4.13.2")
            androidTestImplementation("androidx.test.ext:junit:1.1.5")
            androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
        }
        EOF
        
        # Create MainActivity.kt
        cat > app/src/main/java/com/example/myapplication/MainActivity.kt << 'EOF'
        package com.example.myapplication
        
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        import android.widget.TextView
        
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                
                val textView: TextView = findViewById(R.id.textView)
                textView.text = "Welcome to Android App!"
            }
        }
        EOF
        
        # Create activity_main.xml
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <androidx.constraintlayout.widget.ConstraintLayout 
            xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:padding="16dp">
            
            <TextView
                android:id="@+id/textView"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Hello World!"
                android:textSize="24sp"
                android:textStyle="bold"
                app:layout_constraintBottom_toBottomOf="parent"
                app:layout_constraintLeft_toLeftOf="parent"
                app:layout_constraintRight_toRightOf="parent"
                app:layout_constraintTop_toTopOf="parent" />
                
        </androidx.constraintlayout.widget.ConstraintLayout>
        EOF
        
        # Create strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources>
            <string name="app_name">My Application</string>
        </resources>
        EOF
        
        # Create themes.xml
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <resources>
            <style name="Theme.MyApplication" parent="Theme.AppCompat.Light.DarkActionBar">
                <item name="colorPrimary">@color/purple_500</item>
                <item name="colorPrimaryDark">@color/purple_700</item>
                <item name="colorAccent">@color/teal_200</item>
            </style>
        </resources>
        EOF
        
        # Create colors.xml
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="purple_200">#FFBB86FC</color>
            <color name="purple_500">#FF6200EE</color>
            <color name="purple_700">#FF3700B3</color>
            <color name="teal_200">#FF03DAC5</color>
            <color name="teal_700">#FF018786</color>
            <color name="black">#FF000000</color>
            <color name="white">#FFFFFFFF</color>
        </resources>
        EOF
        
        # Create AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
        
            <application
                android:allowBackup="true"
                android:dataExtractionRules="@xml/data_extraction_rules"
                android:fullBackupContent="@xml/backup_rules"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.MyApplication"
                tools:targetApi="31">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        
        </manifest>
        EOF
        
        # Create backup_rules.xml
        cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <full-backup-content>
            <include domain="sharedpref" path="."/>
            <exclude domain="sharedpref" path="device.xml"/>
        </full-backup-content>
        EOF
        
        # Create data_extraction_rules.xml
        cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <data-extraction-rules>
            <cloud-backup>
                <include domain="sharedpref" path="."/>
            </cloud-backup>
        </data-extraction-rules>
        EOF
        
        # Create gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Download gradle-wrapper.jar
        echo "Downloading gradle-wrapper.jar..."
        curl -s -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        
        # Create gradlew script
        cat > gradlew << 'EOF'
        #!/bin/sh
        exec "$JAVA_HOME/bin/java" -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
        EOF
        
        chmod +x gradlew
        
        # Create proguard-rules.pro
        cat > app/proguard-rules.pro << 'EOF'
        # Add project specific ProGuard rules here.
        # You can control the set of applied configuration files using the
        # proguardFiles setting in build.gradle.
        EOF
        
        echo "✅ Android project created successfully!"
    
    # Step 6: Build the Android project
    - name: Build Android project
      run: |
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        
        echo "🔨 Building Android project ($BUILD_TYPE)..."
        
        # Check if gradlew exists
        if [ ! -f "gradlew" ]; then
            echo "❌ gradlew not found!"
            exit 1
        fi
        
        # Make gradlew executable if not already
        chmod +x gradlew
        
        # Clean previous builds
        echo "🧹 Cleaning previous builds..."
        ./gradlew clean --no-daemon || true
        
        # Sync project and build dependencies
        echo "🔄 Syncing project..."
        ./gradlew build --no-daemon --stacktrace || {
            echo "⚠️ Build failed, attempting to sync dependencies..."
            ./gradlew --refresh-dependencies --no-daemon
        }
        
        # Build APK
        echo "📦 Building APK ($BUILD_TYPE)..."
        if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
        else
            ./gradlew assembleDebug --no-daemon
        fi
        
        # Build AAB (Android App Bundle)
        echo "📦 Building AAB ($BUILD_TYPE)..."
        if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew bundleRelease --no-daemon
        else
            ./gradlew bundleDebug --no-daemon
        fi
        
        echo "✅ Build completed successfully!"
        
        # Display build outputs
        echo "📁 Build outputs:"
        if [ -d "app/build/outputs/apk" ]; then
            echo "APK files:"
            find app/build/outputs/apk -name "*.apk" -type f
        fi
        
        if [ -d "app/build/outputs/bundle" ]; then
            echo "AAB files:"
            find app/build/outputs/bundle -name "*.aab" -type f
        fi
    
    # Step 7: Create artifact directories
    - name: Create artifact directories
      run: |
        mkdir -p artifacts/latest
        mkdir -p artifacts/backup-$(date +'%Y%m%d-%H%M%S')
    
    # Step 8: Copy artifacts to both directories
    - name: Copy build artifacts
      run: |
        # Copy to latest directory
        if [ -d "app/build/outputs/apk" ]; then
          cp -r app/build/outputs/apk/* artifacts/latest/ 2>/dev/null || true
          echo "✅ APK files copied to latest/"
        fi
        
        if [ -d "app/build/outputs/bundle" ]; then
          cp -r app/build/outputs/bundle/* artifacts/latest/ 2>/dev/null || true
          echo "✅ AAB files copied to latest/"
        fi
        
        # Copy to backup directory with timestamp
        BACKUP_DIR=$(ls -d artifacts/backup-* | head -1)
        if [ -d "app/build/outputs/apk" ]; then
          cp -r app/build/outputs/apk/* $BACKUP_DIR/ 2>/dev/null || true
          echo "✅ APK files copied to backup/"
        fi
        
        if [ -d "app/build/outputs/bundle" ]; then
          cp -r app/build/outputs/bundle/* $BACKUP_DIR/ 2>/dev/null || true
          echo "✅ AAB files copied to backup/"
        fi
        
        # Also copy any APK/AAB files found elsewhere
        find app/build -name "*.apk" -o -name "*.aab" | while read file; do
          cp "$file" artifacts/latest/ 2>/dev/null || true
          cp "$file" $BACKUP_DIR/ 2>/dev/null || true
        done
        
        echo "📦 Artifacts copied successfully"
        echo "Contents of artifacts/latest/:"
        ls -la artifacts/latest/ || echo "No files in latest directory"
    
    # Step 9: Upload latest artifacts
    - name: Upload latest artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-latest-build
        path: artifacts/latest/
        retention-days: 7
      if: always()
    
    # Step 10: Upload backup artifacts
    - name: Upload backup artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-backup-build-${{ github.run_id }}
        path: artifacts/backup-*/
        retention-days: 30
      if: always()
    
    # Step 11: Clean up build artifacts (optional, saves space)
    - name: Clean up
      run: |
        echo "🧹 Cleaning up..."
        ./gradlew clean --no-daemon || true
        rm -rf artifacts/backup-*/ || true
        echo "✅ Cleanup completed"
      if: always()
