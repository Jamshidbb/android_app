name: Android Project Setup, Build and Push Artifacts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  setup-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    # Step 1: Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    # Step 2: Set up JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # Step 3: Set up Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    # Step 4: Cache Gradle dependencies (GitHub cache)
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    # Step 5: Restore Maven artifacts from previous build (from repo)
    - name: Restore Maven artifacts from repo cache
      id: restore_cache
      run: |
        # Find the latest Maven cache archive in repo
        LATEST_MAVEN_CACHE=$(ls -t maven-cache-*.tar.gz 2>/dev/null | head -1)
        
        if [ -n "$LATEST_MAVEN_CACHE" ] && [ -f "$LATEST_MAVEN_CACHE" ]; then
          echo "📦 Found Maven cache: $LATEST_MAVEN_CACHE"
          echo "Extracting to ~/.gradle/caches/"
          mkdir -p ~/.gradle/caches
          tar -xzf "$LATEST_MAVEN_CACHE" -C ~/.gradle/caches/
          echo "✅ Maven cache restored"
          echo "cache_restored=true" >> $GITHUB_OUTPUT
        else
          echo "ℹ️ No Maven cache found in repo, will download dependencies"
          echo "cache_restored=false" >> $GITHUB_OUTPUT
        fi
    
    # Step 6: Create Android project if it doesn't exist
    - name: Create Android project (if needed)
      id: create_project
      run: |
        if [ -f "app/build.gradle.kts" ] || [ -f "app/build.gradle" ]; then
            echo "✅ Android project already exists."
            echo "project_created=false" >> $GITHUB_OUTPUT
            exit 0
        fi
        
        echo "project_created=true" >> $GITHUB_OUTPUT
        echo "📱 Creating new Android project..."
        
        mkdir -p app/src/main/java/com/taak/tvhclient/ui/theme
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.code.style=official
        android.nativeLib.ignoreStripErrors=true
        EOF
        
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "TVHClient"
        include(":app")
        EOF
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionSha256Sum=72f44c9f8ebcb1af43838f45ee5c4aa9c5444898b3468ab3f4af7b6076c5bc3f
        distributionUrl=https\://services.gradle.org/distributions/gradle-9.2.1-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        mkdir -p gradle
        cat > gradle/libs.versions.toml << 'EOF'
        [versions]
        agp = "8.5.2"
        kotlin = "1.9.22"
        coreKtx = "1.13.1"
        lifecycleRuntimeKtx = "2.8.4"
        activityCompose = "1.9.0"
        composeBom = "2024.09.00"
        
        [libraries]
        androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
        androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
        androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
        androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
        androidx-compose-ui = { group = "androidx.compose.ui", name = "ui" }
        androidx-compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
        androidx-compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
        androidx-compose-material3 = { group = "androidx.compose.material3", name = "material3" }
        junit = { group = "junit", name = "junit", version.ref = "junit" }
        
        [plugins]
        android-application = { id = "com.android.application", version.ref = "agp" }
        kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
        EOF
        
        cat > build.gradle.kts << 'EOF'
        plugins {
            alias(libs.plugins.android.application) apply false
            alias(libs.plugins.kotlin.compose) apply false
        }
        EOF
        
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            alias(libs.plugins.android.application)
            alias(libs.plugins.kotlin.compose)
        }
        
        android {
            namespace = "com.taak.tvhclient"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.taak.tvhclient"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
            }
            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_11
                targetCompatibility = JavaVersion.VERSION_11
            }
            kotlinOptions { jvmTarget = "11" }
            buildFeatures { compose = true }
            packaging { jniLibs.useLegacyPackaging = true }
        }
        
        dependencies {
            implementation(libs.androidx.core.ktx)
            implementation(libs.androidx.lifecycle.runtime.ktx)
            implementation(libs.androidx.activity.compose)
            implementation(platform(libs.androidx.compose.bom))
            implementation(libs.androidx.compose.ui)
            implementation(libs.androidx.compose.ui.graphics)
            implementation(libs.androidx.compose.ui.tooling.preview)
            implementation(libs.androidx.compose.material3)
            testImplementation(libs.junit)
        }
        EOF
        
        mkdir -p app/src/main/java/com/taak/tvhclient
        cat > app/src/main/java/com/taak/tvhclient/MainActivity.kt << 'EOF'
        package com.taak.tvhclient
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp
        import androidx.compose.ui.unit.sp
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    Surface(modifier = Modifier.fillMaxSize(), color = MaterialTheme.colorScheme.background) {
                        Column(horizontalAlignment = Alignment.CenterHorizontally, verticalArrangement = Arrangement.Center, modifier = Modifier.fillMaxSize()) {
                            Text(text = "Welcome to TVH Client!", fontSize = 24.sp)
                            Text(text = "Android TVHeadend Client", fontSize = 16.sp, modifier = Modifier.padding(top = 8.dp))
                        }
                    }
                }
            }
        }
        EOF
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources><string name="app_name">TVH Client</string></resources>
        EOF
        
        cat > app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.TVHClient" parent="android:Theme.Material.Light.NoActionBar"/>
        </resources>
        EOF
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@android:drawable/sym_def_app_icon" android:label="@string/app_name" android:theme="@style/Theme.TVHClient">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        echo '# Add project specific ProGuard rules here.' > app/proguard-rules.pro
        
        curl -s -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.2.1/gradle/wrapper/gradle-wrapper.jar
        
        echo '#!/bin/sh' > gradlew
        echo 'exec "$JAVA_HOME/bin/java" -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
        chmod +x gradlew
        
        echo "✅ Android project created"
    
    # Step 7: Build Android project (with offline mode if cache available)
    - name: Build Android project
      run: |
        chmod +x gradlew
        
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        
        if [ "${{ steps.restore_cache.outputs.cache_restored }}" = "true" ]; then
          echo "🔌 Attempting offline build using cached Maven artifacts..."
          if ./gradlew assemble${BUILD_TYPE^} --offline --no-daemon --stacktrace; then
            echo "✅ Offline build successful!"
          else
            echo "⚠️ Offline build failed, falling back to online mode..."
            ./gradlew assemble${BUILD_TYPE^} --no-daemon --stacktrace
          fi
        else
          echo "🌐 No cache available, building online..."
          ./gradlew assemble${BUILD_TYPE^} --no-daemon --stacktrace
        fi
        
        echo "✅ Build completed!"
    
    # Step 8: Prepare and zip artifacts (including Maven cache)
    - name: Prepare and zip artifacts
      run: |
        TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        ARTIFACT_NAME="android-build-${BUILD_TYPE}-${TIMESTAMP}"
        mkdir -p repo-artifacts
        
        echo "📦 Creating zip archive: ${ARTIFACT_NAME}.zip"
        
        # Create temporary directory for artifacts
        mkdir -p temp-artifacts
        mkdir -p temp-artifacts/maven-cache
        
        # Copy APK files
        if [ -d "app/build/outputs/apk" ]; then
            cp -r app/build/outputs/apk/* temp-artifacts/ 2>/dev/null || true
            echo "✅ Copied APK files"
        fi
        
        # Copy Maven artifacts (Gradle dependencies)
        if [ -d ~/.gradle/caches/modules-2/files-2.1 ]; then
            echo "📚 Copying Maven artifacts from Gradle cache..."
            # Copy the actual dependency files
            cp -r ~/.gradle/caches/modules-2/files-2.1/* temp-artifacts/maven-cache/ 2>/dev/null || true
            
            # Count artifacts
            ARTIFACT_COUNT=$(find temp-artifacts/maven-cache -type f \( -name "*.jar" -o -name "*.aar" -o -name "*.pom" \) 2>/dev/null | wc -l)
            CACHE_SIZE=$(du -sh temp-artifacts/maven-cache 2>/dev/null | cut -f1)
            echo "✅ Copied ${ARTIFACT_COUNT} Maven artifacts (${CACHE_SIZE})"
        fi
        
        # Copy Gradle wrapper distributions
        if [ -d ~/.gradle/wrapper/dists ]; then
            echo "📦 Copying Gradle wrapper distributions..."
            cp -r ~/.gradle/wrapper/dists/* temp-artifacts/gradle-wrapper/ 2>/dev/null || true
            WRAPPER_SIZE=$(du -sh temp-artifacts/gradle-wrapper 2>/dev/null | cut -f1)
            echo "✅ Copied Gradle wrappers (${WRAPPER_SIZE})"
        fi
        
        # Copy Kotlin compiler cache (optional, speeds up builds)
        if [ -d ~/.kotlin ]; then
            echo "🔧 Copying Kotlin compiler cache..."
            cp -r ~/.kotlin/* temp-artifacts/kotlin-cache/ 2>/dev/null || true
            KOTLIN_SIZE=$(du -sh temp-artifacts/kotlin-cache 2>/dev/null | cut -f1)
            echo "✅ Copied Kotlin cache (${KOTLIN_SIZE})"
        fi
        
        # Copy Android build cache
        if [ -d ~/.android/build-cache ]; then
            echo "🤖 Copying Android build cache..."
            cp -r ~/.android/build-cache/* temp-artifacts/android-cache/ 2>/dev/null || true
            ANDROID_CACHE_SIZE=$(du -sh temp-artifacts/android-cache 2>/dev/null | cut -f1)
            echo "✅ Copied Android cache (${ANDROID_CACHE_SIZE})"
        fi
        
        # Create version info
        cat > temp-artifacts/version.json << EOF
        {
          "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "build_type": "${BUILD_TYPE}",
          "run_id": "${{ github.run_id }}",
          "run_number": "${{ github.run_number }}",
          "commit_sha": "${{ github.sha }}",
          "commit_message": "${{ github.event.head_commit.message }}",
          "maven_artifacts_included": true,
          "gradle_wrapper_included": true,
          "kotlin_cache_included": true,
          "android_cache_included": true
        }
        EOF
        
        # Create a README for the artifact
        cat > temp-artifacts/README.txt << EOF
        ===================================
        Android Build Artifact
        ===================================
        
        Build: ${ARTIFACT_NAME}
        Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
        Type: ${BUILD_TYPE}
        Run #: ${{ github.run_number }}
        
        Contents:
        - APK files (app-*.apk)
        - Maven cache (complete Gradle dependencies)
        - Gradle wrapper distributions
        - Kotlin compiler cache
        - Android build cache
        
        To restore Maven cache for offline building:
        1. Extract this zip
        2. Copy maven-cache/ to ~/.gradle/caches/modules-2/files-2.1/
        3. Copy gradle-wrapper/ to ~/.gradle/wrapper/dists/
        4. Copy kotlin-cache/ to ~/.kotlin/
        5. Copy android-cache/ to ~/.android/build-cache/
        
        Or simply extract everything to your Gradle user home directory.
        ===================================
        EOF
        
        # Create the zip archive
        cd temp-artifacts
        zip -r "../repo-artifacts/${ARTIFACT_NAME}.zip" ./*
        cd ..
        
        # Get zip file size
        ZIP_SIZE=$(du -h "repo-artifacts/${ARTIFACT_NAME}.zip" | cut -f1)
        echo "✅ Created zip archive: ${ARTIFACT_NAME}.zip (${ZIP_SIZE})"
        
        # Save artifact name for later steps
        echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
        echo "ARTIFACT_ZIP=repo-artifacts/${ARTIFACT_NAME}.zip" >> $GITHUB_ENV
        
        # Clean up temp directory
        rm -rf temp-artifacts
    
    # Step 9: Create separate Maven cache archive (for faster incremental updates)
    - name: Create separate Maven cache archive
      run: |
        if [ -d ~/.gradle/caches/modules-2/files-2.1 ]; then
          echo "📚 Creating separate Maven cache archive..."
          cd ~/.gradle/caches/
          tar -czf "${GITHUB_WORKSPACE}/maven-cache-${GITHUB_RUN_ID}.tar.gz" modules-2/
          cd ${GITHUB_WORKSPACE}
          
          MAVEN_CACHE_SIZE=$(du -h "maven-cache-${GITHUB_RUN_ID}.tar.gz" | cut -f1)
          echo "✅ Separate Maven cache archive created: ${MAVEN_CACHE_SIZE}"
          echo "MAVEN_CACHE_ARCHIVE=maven-cache-${GITHUB_RUN_ID}.tar.gz" >> $GITHUB_ENV
        fi
    
    # Step 10: Split large files if needed and push to repo
    - name: Split and push artifacts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        ZIP_FILE="$ARTIFACT_ZIP"
        if [ -f "$ZIP_FILE" ]; then
          ZIP_SIZE=$(stat -c%s "$ZIP_FILE" 2>/dev/null || stat -f%z "$ZIP_FILE" 2>/dev/null)
          MAX_SIZE=$((95 * 1024 * 1024)) # 95MB in bytes
          
          if [ $ZIP_SIZE -gt $MAX_SIZE ]; then
              echo "⚠️ Zip file exceeds 95MB, splitting into parts..."
              
              # Split the zip file
              split -b 95M -d "$ZIP_FILE" "${ZIP_FILE}.part"
              rm "$ZIP_FILE"
              
              # Create reassembly script
              REASSEMBLE_SCRIPT="${ZIP_FILE}.sh"
              echo "#!/bin/bash" > "$REASSEMBLE_SCRIPT"
              echo "# Reassembly script for split zip file" >> "$REASSEMBLE_SCRIPT"
              echo "echo \"Reassembling ${ARTIFACT_NAME}.zip...\"" >> "$REASSEMBLE_SCRIPT"
              echo "cat ${ARTIFACT_NAME}.zip.part* > ${ARTIFACT_NAME}.zip" >> "$REASSEMBLE_SCRIPT"
              echo "echo \"Done! You can now unzip ${ARTIFACT_NAME}.zip\"" >> "$REASSEMBLE_SCRIPT"
              chmod +x "$REASSEMBLE_SCRIPT"
              
              echo "✅ Zip file split into parts"
              echo "split_required=true" >> $GITHUB_ENV
          else
              echo "✅ Zip file size is within limits ($(du -h "$ZIP_FILE" | cut -f1))"
              echo "split_required=false" >> $GITHUB_ENV
          fi
        fi
        
        # Also handle separate Maven cache archive if it exists
        if [ -n "$MAVEN_CACHE_ARCHIVE" ] && [ -f "$MAVEN_CACHE_ARCHIVE" ]; then
          MAVEN_SIZE=$(stat -c%s "$MAVEN_CACHE_ARCHIVE" 2>/dev/null || stat -f%z "$MAVEN_CACHE_ARCHIVE" 2>/dev/null)
          MAX_SIZE=$((95 * 1024 * 1024))
          
          if [ $MAVEN_SIZE -gt $MAX_SIZE ]; then
              echo "⚠️ Maven cache archive exceeds 95MB, splitting..."
              split -b 95M -d "$MAVEN_CACHE_ARCHIVE" "${MAVEN_CACHE_ARCHIVE}.part"
              rm "$MAVEN_CACHE_ARCHIVE"
          fi
        fi
        
        # Add all artifacts
        git add repo-artifacts/ || true
        git add maven-cache-*.tar.gz* 2>/dev/null || true
        
        if git diff --staged --quiet && git diff --quiet; then
            echo "No changes to commit"
        else
            echo "Committing artifacts..."
            git commit -m "Add build artifacts: ${ARTIFACT_NAME} [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
            echo "✅ Artifacts pushed to repository"
        fi
    
    # Step 11: Cleanup old cache files (keep last 5)
    - name: Cleanup old cache files
      run: |
        # Keep only last 5 Maven cache archives
        cd ${GITHUB_WORKSPACE}
        ls -t maven-cache-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r git rm -f || true
        
        # Keep only last 10 build artifacts
        cd repo-artifacts
        ls -t android-build-*.zip* 2>/dev/null | tail -n +11 | xargs -r git rm -f || true
        cd ..
        
        git commit -m "Cleanup old cache files [skip ci]" || true
        git push origin HEAD:${GITHUB_REF#refs/heads/} || true
    
    # Step 12: Update latest build reference
    - name: Update latest build reference
      run: |
        # Create or update latest build info
        cat > repo-artifacts/latest-build.json << EOF
        {
          "artifact_name": "$ARTIFACT_NAME",
          "zip_file": "$ARTIFACT_ZIP",
          "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "build_type": "${{ github.event.inputs.build_type || 'debug' }}",
          "run_id": "${{ github.run_id }}",
          "run_number": "${{ github.run_number }}",
          "split_required": ${split_required:-false},
          "maven_cache_archive": "$MAVEN_CACHE_ARCHIVE"
        }
        EOF
        
        git add repo-artifacts/latest-build.json
        git commit -m "Update latest build reference [skip ci]" || true
        git push origin HEAD:${GITHUB_REF#refs/heads/} || true
        
        echo "✅ Latest build reference updated"
    
    # Step 13: Upload to GitHub Actions
    - name: Upload to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_ZIP }}
        retention-days: 30
      if: always()
    
    # Step 14: Upload Maven cache separately (optional)
    - name: Upload Maven cache to GitHub Actions
      uses: actions/upload-artifact@v4
      with:
        name: maven-cache-${{ github.run_number }}
        path: maven-cache-*.tar.gz
        retention-days: 30
      if: env.MAVEN_CACHE_ARCHIVE != ''
    
    # Step 15: Summary
    - name: Summary
      run: |
        echo "=========================================="
        echo "✅ BUILD COMPLETE"
        echo "=========================================="
        echo "Artifact name: $ARTIFACT_NAME"
        echo "Artifact location: $ARTIFACT_ZIP"
        echo "Latest build: repo-artifacts/latest-build.json"
        echo ""
        if [ -n "$MAVEN_CACHE_ARCHIVE" ]; then
          echo "📚 Maven cache archive: $MAVEN_CACHE_ARCHIVE"
          echo "   Size: $(du -h $MAVEN_CACHE_ARCHIVE 2>/dev/null | cut -f1)"
        fi
        echo ""
        if [ "${split_required:-false}" = "true" ]; then
          echo "⚠️  Note: Zip file was split into parts (<100MB each)"
          echo "    Use the provided .sh script to reassemble"
        fi
        echo ""
        echo "Contents of zip:"
        echo "  - APK files"
        echo "  - Complete Maven cache (all Gradle dependencies)"
        echo "  - Gradle wrapper distributions"
        echo "  - Kotlin compiler cache"
        echo "  - Android build cache"
        echo ""
        echo "To use offline build in future:"
        echo "  unzip $ARTIFACT_NAME.zip"
        echo "  cp -r maven-cache/* ~/.gradle/caches/modules-2/files-2.1/"
        echo "  cp -r gradle-wrapper/* ~/.gradle/wrapper/dists/"
        echo "  cp -r kotlin-cache/* ~/.kotlin/"
        echo "  cp -r android-cache/* ~/.android/build-cache/"
        echo "=========================================="
