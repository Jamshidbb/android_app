name: Gradle Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$(pwd)/gradle-8.5/bin" >> $GITHUB_PATH
      
      - name: Create init script with Android repositories
        run: |
          mkdir -p .gradle/init.d
          cat > .gradle/init.d/android-repos.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      gradlePluginPortal()
                  }
              }
          }
          EOF
      
      - name: Download Android dependencies only
        run: |
          # Create a temporary settings.gradle if missing
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "rootProject.name = 'temp'" > settings.gradle.kts
          fi
          
          # Download dependencies without building
          gradle downloadDependencies --no-daemon 2>&1 || \
          gradle dependencies --no-daemon 2>&1 || \
          gradle build --no-daemon --dry-run 2>&1 || true
          
          # Download Android plugin specifically
          gradle init --type basic --dsl kotlin --no-daemon 2>&1 || true
      
      - name: Force download common Android artifacts
        run: |
          cat > download-android.gradle << 'EOF'
          configurations {
              androidPlugin
              kotlinPlugin
          }
          
          repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
          }
          
          dependencies {
              androidPlugin("com.android.tools.build:gradle:9.0.0")
              kotlinPlugin("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0")
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          
          task downloadDeps {
              doLast {
                  configurations.each { config ->
                      if (config.isCanBeResolved()) {
                          println "Resolving ${config.name}"
                          config.files
                      }
                  }
              }
          }
          EOF
          
          gradle -b download-android.gradle downloadDeps --no-daemon 2>&1 || true
      
      - name: Prepare cache
        run: |
          mkdir -p offline-cache/caches
          
          if [ -d ~/.gradle/caches/modules-2 ]; then
            cp -r ~/.gradle/caches/modules-2 offline-cache/caches/
          fi
          
          if [ -d ~/.gradle/caches/transforms-3 ]; then
            cp -r ~/.gradle/caches/transforms-3 offline-cache/caches/ 2>/dev/null || true
          fi
          
          if [ -d ~/.gradle/wrapper/dists ]; then
            mkdir -p offline-cache/wrapper
            cp -r ~/.gradle/wrapper/dists offline-cache/wrapper/
          fi
          
          cat > offline-cache/install.sh << 'SCRIPT'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          mkdir -p ~/.gradle
          ln -sfn "$SCRIPT_DIR/caches" ~/.gradle/caches
          ln -sfn "$SCRIPT_DIR/wrapper/dists" ~/.gradle/wrapper/dists 2>/dev/null || true
          echo "✓ Gradle cache installed"
          echo "Run: ./gradlew build --offline"
          SCRIPT
          
          chmod +x offline-cache/install.sh
          
          echo "Cache size: $(du -sh offline-cache 2>/dev/null)"
      
      - name: Push to branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git push origin --delete gradle-cache 2>/dev/null || true
          git checkout --orphan gradle-cache
          git rm -rf . 2>/dev/null || true
          
          cp -r offline-cache/* .
          rm -rf offline-cache
          
          echo "# Gradle Cache" > README.md
          echo "Created: $(date)" >> README.md
          echo "Run ./install.sh to use this cache" >> README.md
          
          git add .
          git commit -m "Gradle cache $(date +%Y%m%d_%H%M%S)"
          git push origin gradle-cache --force
          
          echo "✅ Pushed to https://github.com/${{ github.repository }}/tree/gradle-cache"
