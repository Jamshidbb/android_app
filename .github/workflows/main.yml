name: Cache and Push Gradle Dependencies

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/gradle/libs.versions.toml'
      - '**/gradle/wrapper/gradle-wrapper.properties'
  workflow_dispatch:

jobs:
  download-and-push-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Setup gradlew if missing
        run: |
          # If gradlew doesn't exist, initialize Gradle wrapper
          if [ ! -f "gradlew" ]; then
            echo "⚠️ gradlew not found, creating minimal wrapper..."
            
            # Create directories
            mkdir -p gradle/wrapper
            
            # Create gradle-wrapper.properties
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            
            # Download gradle-wrapper.jar
            curl -s -L https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            
            # Create simple gradlew script
            echo '#!/bin/sh' > gradlew
            echo 'java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
            
            # Make executable
            chmod +x gradlew
            
            echo "✅ Minimal gradlew created"
          else
            echo "✅ gradlew already exists"
            chmod +x gradlew
          fi
          
          echo "gradlew is ready"
          ./gradlew --version || echo "⚠️ Gradle wrapper test had issues, but continuing..."
      
      - name: Download dependencies
        run: |
          echo "Downloading dependencies..."
          
          # Download dependencies using various methods
          ./gradlew build --dry-run 2>&1 || true
          ./gradlew dependencies 2>&1 || true
          
          # Try to download all configurations
          ./gradlew dependencyInsight --all 2>&1 || true
          
          # Alternative: create and run a dependency resolution script
          cat > resolve-deps.gradle << 'EOF'
          task resolveAllDependencies {
              doLast {
                  def allConfigs = configurations
                      .findAll { it.canBeResolved }
                      .collect { it.name }
                  
                  allConfigs.each { configName ->
                      try {
                          println "Resolving configuration: $configName"
                          def files = configurations.getByName(configName).files
                          println "  Resolved ${files.size()} files"
                      } catch (Exception e) {
                          println "  Could not resolve: ${e.message}"
                      }
                  }
              }
          }
          EOF
          
          ./gradlew resolveAllDependencies 2>&1 || true
      
      - name: Cache Gradle dependencies
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper/dists
          key: gradle-cache-${{ runner.os }}-${{ hashFiles('**/build.gradle', '**/build.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-
      
      - name: Copy cache to artifact directory
        run: |
          mkdir -p gradle-cache-artifact
          
          # Copy Gradle caches
          if [ -d ~/.gradle/caches/modules-2 ]; then
            cp -r ~/.gradle/caches/modules-2 gradle-cache-artifact/caches/
            echo "✅ Copied modules cache"
          fi
          
          if [ -d ~/.gradle/wrapper/dists ]; then
            cp -r ~/.gradle/wrapper/dists gradle-cache-artifact/wrapper/
            echo "✅ Copied wrapper distributions"
          fi
          
          # Copy wrapper files
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            mkdir -p gradle-cache-artifact/gradle/wrapper
            cp gradle/wrapper/gradle-wrapper.properties gradle-cache-artifact/gradle/wrapper/
          fi
          
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            cp gradle/wrapper/gradle-wrapper.jar gradle-cache-artifact/gradle/wrapper/
          fi
          
          if [ -f "gradlew" ]; then
            cp gradlew gradle-cache-artifact/
          fi
          
          # Create metadata
          echo "Cache created: $(date)" > gradle-cache-artifact/cache-info.txt
          echo "Gradle version: $(./gradlew --version | head -1)" >> gradle-cache-artifact/cache-info.txt
          
          # Create install script
          echo '#!/bin/bash' > gradle-cache-artifact/install.sh
          echo 'echo "Installing Gradle cache..."' >> gradle-cache-artifact/install.sh
          echo 'mkdir -p ~/.gradle' >> gradle-cache-artifact/install.sh
          echo '' >> gradle-cache-artifact/install.sh
          echo '# Backup existing cache' >> gradle-cache-artifact/install.sh
          echo 'if [ -d ~/.gradle/caches ] && [ ! -L ~/.gradle/caches ]; then' >> gradle-cache-artifact/install.sh
          echo '  mv ~/.gradle/caches ~/.gradle/caches.backup.$(date +%s)' >> gradle-cache-artifact/install.sh
          echo 'fi' >> gradle-cache-artifact/install.sh
          echo '' >> gradle-cache-artifact/install.sh
          echo '# Link cache' >> gradle-cache-artifact/install.sh
          echo 'if [ -d "$(pwd)/caches" ]; then' >> gradle-cache-artifact/install.sh
          echo '  ln -sfn "$(pwd)/caches" ~/.gradle/caches' >> gradle-cache-artifact/install.sh
          echo '  echo "✅ Cache linked"' >> gradle-cache-artifact/install.sh
          echo 'fi' >> gradle-cache-artifact/install.sh
          echo '' >> gradle-cache-artifact/install.sh
          echo '# Link wrapper distributions' >> gradle-cache-artifact/install.sh
          echo 'if [ -d "$(pwd)/wrapper" ]; then' >> gradle-cache-artifact/install.sh
          echo '  ln -sfn "$(pwd)/wrapper" ~/.gradle/wrapper' >> gradle-cache-artifact/install.sh
          echo '  echo "✅ Wrapper distributions linked"' >> gradle-cache-artifact/install.sh
          echo 'fi' >> gradle-cache-artifact/install.sh
          
          chmod +x gradle-cache-artifact/install.sh
          
          echo "✅ Cache artifact prepared"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-cache
          path: gradle-cache-artifact/
          retention-days: 30
      
      - name: Push to cache branch
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create a simple cache branch
          git checkout --orphan gradle-cache-branch
          git rm -rf . 2>/dev/null || true
          
          # Copy the cache
          mkdir -p .gradle-cache
          cp -r gradle-cache-artifact/* .gradle-cache/
          
          # Add a README
          echo "# Gradle Cache" > README.md
          echo "This branch contains cached Gradle dependencies." >> README.md
          echo "" >> README.md
          echo "## Usage" >> README.md
          echo "1. Clone this branch: \`git clone --branch gradle-cache-branch <repo-url> gradle-cache\`" >> README.md
          echo "2. Run \`cd gradle-cache && ./install.sh\`" >> README.md
          echo "3. Build your project: \`./gradlew build\`" >> README.md
          
          git add .gradle-cache README.md
          git commit -m "Gradle cache from $(date -u '+%Y-%m-%d')"
          git push origin gradle-cache-branch --force
          
          echo "✅ Pushed to gradle-cache-branch"
