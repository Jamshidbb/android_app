name: Gradle Dependencies

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**/build.gradle'
      - '**/build.gradle.kts'
      - '**/gradle/libs.versions.toml'
      - '**/gradle/wrapper/gradle-wrapper.properties'
  workflow_dispatch:

jobs:
  download-and-push-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Generate Gradle wrapper if not exists
        run: |
          # Check if gradlew exists, if not, generate it
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            
            # Check if there's a gradle-wrapper.properties to determine version
            if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
              echo "Using existing wrapper properties"
              # Generate wrapper using gradle command
              if command -v gradle &> /dev/null; then
                gradle wrapper
              else
                # If gradle not installed, use a default version
                echo "Installing Gradle wrapper with version 8.5"
                curl -L https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
                unzip -q /tmp/gradle.zip -d /tmp/
                /tmp/gradle-8.5/bin/gradle wrapper
              fi
            else
              # Create default wrapper
              echo "Creating default Gradle wrapper"
              mkdir -p gradle/wrapper
              
              # Create gradle-wrapper.properties using printf instead of heredoc
              printf '%s\n' \
                'distributionBase=GRADLE_USER_HOME' \
                'distributionPath=wrapper/dists' \
                'distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip' \
                'zipStoreBase=GRADLE_USER_HOME' \
                'zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties
              
              # Download gradle-wrapper.jar
              curl -L https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
              
              # Create gradlew script
              cat > gradlew << 'GRADLEW_SCRIPT'
              #!/bin/sh
              #
              # Copyright © 2007-2024 Gradle Inc.
              #
              # Licensed under the Apache License, Version 2.0 (the "License");
              # you may not use this file except in compliance with the License.
              # You may obtain a copy of the License at
              #
              #     http://www.apache.org/licenses/LICENSE-2.0
              #
              # Unless required by applicable law or agreed to in writing, software
              # distributed under the License is distributed on an "AS IS" BASIS,
              # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
              # See the License for the specific language governing permissions and
              # limitations under the License.
              #
              
              # Attempt to set APP_HOME
              # Resolve links: $0 may be a link
              PRG="$0"
              # Need this for relative symlinks.
              while [ -h "$PRG" ] ; do
                  ls=`ls -ld "$PRG"`
                  link=`expr "$ls" : '.*-> \(.*\)$'`
                  if expr "$link" : '/.*' > /dev/null; then
                      PRG="$link"
                  else
                      PRG=`dirname "$PRG"`"/$link"
                  fi
              done
              SAVED="`pwd`"
              cd "`dirname \"$PRG\"`/" >/dev/null
              APP_HOME="`pwd -P`"
              cd "$SAVED" >/dev/null
              
              APP_NAME="Gradle"
              APP_BASE_NAME=`basename "$0"`
              
              # Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
              DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
              
              # Use the maximum available, or set MAX_FD != -1 to use that value.
              MAX_FD="maximum"
              
              warn () {
                  echo "$*"
              }
              
              die () {
                  echo
                  echo "$*"
                  echo
                  exit 1
              }
              
              # OS specific support (must be 'true' or 'false').
              cygwin=false
              msys=false
              darwin=false
              nonstop=false
              case "`uname`" in
                CYGWIN* )
                  cygwin=true
                  ;;
                Darwin* )
                  darwin=true
                  ;;
                MINGW* )
                  msys=true
                  ;;
                NONSTOP* )
                  nonstop=true
                  ;;
              esac
              
              CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
              
              # Determine the Java command to use to start the JVM.
              if [ -n "$JAVA_HOME" ] ; then
                  if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                      # IBM's JDK on AIX uses strange locations for the executables
                      JAVACMD="$JAVA_HOME/jre/sh/java"
                  else
                      JAVACMD="$JAVA_HOME/bin/java"
                  fi
                  if [ ! -x "$JAVACMD" ] ; then
                      die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME
                  
                  Please set the JAVA_HOME variable in your environment to match the
                  location of your Java installation."
                  fi
              else
                  JAVACMD="java"
                  which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.
                  
                  Please set the JAVA_HOME variable in your environment to match the
                  location of your Java installation."
              fi
              
              # Increase the maximum file descriptors if we can.
              if [ "$cygwin" = "false" -a "$darwin" = "false" -a "$nonstop" = "false" ] ; then
                  MAX_FD_LIMIT=`ulimit -H -n`
                  if [ $? -eq 0 ] ; then
                      if [ "$MAX_FD" = "maximum" -o "$MAX_FD" = "max" ] ; then
                          MAX_FD="$MAX_FD_LIMIT"
                      fi
                      ulimit -n $MAX_FD
                      if [ $? -ne 0 ] ; then
                          warn "Could not set maximum file descriptor limit: $MAX_FD"
                      fi
                  else
                      warn "Could not query maximum file descriptor limit: $MAX_FD_LIMIT"
                  fi
              fi
              
              # For Darwin, add options to specify how the application appears in the dock
              if $darwin; then
                  GRADLE_OPTS="$GRADLE_OPTS \"-Xdock:name=$APP_NAME\" \"-Xdock:icon=$APP_HOME/media/gradle.icns\""
              fi
              
              # For Cygwin or MSYS, switch paths to Windows format before running java
              if [ "$cygwin" = "true" -o "$msys" = "true" ] ; then
                  APP_HOME=`cygpath --path --mixed "$APP_HOME"`
                  CLASSPATH=`cygpath --path --mixed "$CLASSPATH"`
                  
                  JAVACMD=`cygpath --unix "$JAVACMD"`
                  
                  # We build the pattern for arguments to be converted via cygpath
                  ROOTDIRSRAW=`find -L / -maxdepth 1 -mindepth 1 -type d 2>/dev/null`
                  SEP=""
                  for dir in $ROOTDIRSRAW ; do
                      ROOTDIRS="$ROOTDIRS$SEP$dir"
                      SEP="|"
                  done
                  OURCYGPATTERN="(^($ROOTDIRS))"
                  # Add a user-defined pattern to the cygpath arguments
                  if [ "$GRADLE_CYGPATTERN" != "" ] ; then
                      OURCYGPATTERN="$OURCYGPATTERN|($GRADLE_CYGPATTERN)"
                  fi
                  # Now convert the arguments - kludge to limit ourselves to /bin/sh
                  i=0
                  for arg in "$@" ; do
                      CHECK=`echo "$arg"|egrep -c "$OURCYGPATTERN" -`
                      CHECK2=`echo "$arg"|egrep -c "^-"`                                 ### Determine if an option
                      
                      if [ $CHECK -ne 0 ] && [ $CHECK2 -eq 0 ] ; then                    ### Added a condition
                          eval `echo args$i`=`cygpath --path --ignore --mixed "$arg"`
                      else
                          eval `echo args$i`="\"$arg\""
                      fi
                      i=`expr $i + 1`
                  done
                  case $i in
                      0) set -- ;;
                      1) set -- "$args0" ;;
                      2) set -- "$args0" "$args1" ;;
                      3) set -- "$args0" "$args1" "$args2" ;;
                      4) set -- "$args0" "$args1" "$args2" "$args3" ;;
                      5) set -- "$args0" "$args1" "$args2" "$args3" "$args4" ;;
                      6) set -- "$args0" "$args1" "$args2" "$args3" "$args4" "$args5" ;;
                      7) set -- "$args0" "$args1" "$args2" "$args3" "$args4" "$args5" "$args6" ;;
                      8) set -- "$args0" "$args1" "$args2" "$args3" "$args4" "$args5" "$args6" "$args7" ;;
                      9) set -- "$args0" "$args1" "$args2" "$args3" "$args4" "$args5" "$args6" "$args7" "$args8" ;;
                  esac
              fi
              
              # Escape application args
              save () {
                  for i do printf %s\\n "$i" | sed "s/'/'\\\\''/g;1s/^/'/;\$s/\$/' \\\\/" ; done
                  echo " "
              }
              APP_ARGS=`save "$@"`
              
              # Collect all arguments for the java command, following the shell quoting and substitution rules
              eval set -- $DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS "\"-Dorg.gradle.appname=$APP_BASE_NAME\"" -classpath "\"$CLASSPATH\"" org.gradle.wrapper.GradleWrapperMain $APP_ARGS
              
              exec "$JAVACMD" "$@"
              GRADLEW_SCRIPT
              
              chmod +x gradlew
              
              # Create gradlew.bat for Windows
              cat > gradlew.bat << 'GRADLEW_BAT'
              @rem
              @rem Copyright 2015 the original author or authors.
              @rem
              @rem Licensed under the Apache License, Version 2.0 (the "License");
              @rem you may not use this file except in compliance with the License.
              @rem You may obtain a copy of the License at
              @rem
              @rem      https://www.apache.org/licenses/LICENSE-2.0
              @rem
              @rem Unless required by applicable law or agreed to in writing, software
              @rem distributed under the License is distributed on an "AS IS" BASIS,
              @rem WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
              @rem See the License for the specific language governing permissions and
              @rem limitations under the License.
              @rem
              
              @if "%DEBUG%"=="" @echo off
              @rem ##########################################################################
              @rem
              @rem  Gradle startup script for Windows
              @rem
              @rem ##########################################################################
              
              @rem Set local scope for the variables with windows NT shell
              if "%OS%"=="Windows_NT" setlocal
              
              set DIRNAME=%~dp0
              if "%DIRNAME%"=="" set DIRNAME=.
              @rem This is normally unused
              set APP_BASE_NAME=%~n0
              set APP_HOME=%DIRNAME%
              
              @rem Resolve any "." and ".." in APP_HOME to make it shorter.
              for %%i in ("%APP_HOME%") do set APP_HOME=%%~fsi
              
              @rem Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
              set DEFAULT_JVM_OPTS="-Xmx64m" "-Xms64m"
              
              @rem Find java.exe
              if defined JAVA_HOME goto findJavaFromJavaHome
              
              set JAVA_EXE=java.exe
              %JAVA_EXE% -version >NUL 2>&1
              if %ERRORLEVEL% equ 0 goto execute
              
              echo. 1>&2
              echo ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH. 1>&2
              echo. 1>&2
              echo Please set the JAVA_HOME variable in your environment to match the 1>&2
              echo location of your Java installation. 1>&2
              
              goto fail
              
              :findJavaFromJavaHome
              set JAVA_HOME=%JAVA_HOME:"=%
              set JAVA_EXE=%JAVA_HOME%/bin/java.exe
              
              if exist "%JAVA_EXE%" goto execute
              
              echo. 1>&2
              echo ERROR: JAVA_HOME is set to an invalid directory: %JAVA_HOME% 1>&2
              echo. 1>&2
              echo Please set the JAVA_HOME variable in your environment to match the 1>&2
              echo location of your Java installation. 1>&2
              
              goto fail
              
              :execute
              @rem Setup the command line
              
              set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar
              
              
              @rem Execute Gradle
              "%JAVA_EXE%" %DEFAULT_JVM_OPTS% %JAVA_OPTS% %GRADLE_OPTS% "-Dorg.gradle.appname=%APP_BASE_NAME%" -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
              
              :end
              @rem End local scope for the variables with windows NT shell
              if %ERRORLEVEL% equ 0 goto mainEnd
              
              :fail
              set EXIT_CODE=%ERRORLEVEL%
              if %EXIT_CODE% equ 0 set EXIT_CODE=1
              exit /b %EXIT_CODE%
              
              :mainEnd
              if "%OS%"=="Windows_NT" endlocal
              
              :omega
              GRADLEW_BAT
            fi
          fi
          
          # Make gradlew executable
          chmod +x gradlew
          echo "gradlew is ready"
      
      - name: Download all dependencies
        run: |
          # Now gradlew should exist
          echo "Downloading dependencies..."
          
          # Try to build the dependency cache
          ./gradlew build --dry-run || true
          ./gradlew dependencies || true
          
          # Download all possible dependency configurations
          ./gradlew dependencyInsight --all || true
          
          # For multi-module projects
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            ./gradlew resolveAllDependencies || true
          fi
      
      - name: Collect Gradle wrapper files
        run: |
          echo "Collecting Gradle wrapper files..."
          
          # Create directory structure
          mkdir -p gradle-dependency-cache/gradle/wrapper
          
          # Copy wrapper properties from project root
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            cp gradle/wrapper/gradle-wrapper.properties gradle-dependency-cache/gradle/wrapper/
            echo "Root wrapper properties:" > gradle-dependency-cache/wrapper-info.txt
            cat gradle/wrapper/gradle-wrapper.properties >> gradle-dependency-cache/wrapper-info.txt
          fi
          
          # Copy gradle-wrapper.jar if it exists
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            cp gradle/wrapper/gradle-wrapper.jar gradle-dependency-cache/gradle/wrapper/
          fi
          
          # Also save the wrapper scripts
          if [ -f "gradlew" ]; then
            cp gradlew gradle-dependency-cache/
            cp gradlew.bat gradle-dependency-cache/ 2>/dev/null || true
          fi
      
      - name: Copy Gradle caches
        run: |
          mkdir -p gradle-dependency-cache/caches
          mkdir -p gradle-dependency-cache/wrapper
          
          # Copy Gradle cache if it exists
          if [ -d ~/.gradle/caches ]; then
            # Copy only module cache (not build cache to save space)
            if [ -d ~/.gradle/caches/modules-2 ]; then
              mkdir -p gradle-dependency-cache/caches/
              cp -r ~/.gradle/caches/modules-2 gradle-dependency-cache/caches/
            fi
          fi
          
          # Copy Gradle wrapper distribution cache
          if [ -d ~/.gradle/wrapper/dists ]; then
            mkdir -p gradle-dependency-cache/wrapper/
            cp -r ~/.gradle/wrapper/dists gradle-dependency-cache/wrapper/
          fi
          
          # Create metadata file
          echo "=== CACHE METADATA ===" > gradle-dependency-cache/cache-info.txt
          echo "Dependencies cached on: $(date)" >> gradle-dependency-cache/cache-info.txt
          echo "Git commit: $(git rev-parse HEAD)" >> gradle-dependency-cache/cache-info.txt
          echo "Git branch: $(git rev-parse --abbrev-ref HEAD)" >> gradle-dependency-cache/cache-info.txt
      
      - name: Create helper script
        run: |
          cat > gradle-dependency-cache/use-cache.sh << 'EOF'
          #!/bin/bash
          # Helper script to use the cached dependencies
          
          # Create symlink to cached modules
          if [ -d ".gradle-cache/caches/modules-2" ]; then
              mkdir -p ~/.gradle/caches
              
              # Backup existing cache
              if [ -d ~/.gradle/caches/modules-2 ] && [ ! -L ~/.gradle/caches/modules-2 ]; then
                  echo "Backing up existing modules cache..."
                  mv ~/.gradle/caches/modules-2 ~/.gradle/caches/modules-2.backup.$(date +%s)
              fi
              
              # Remove symlink if exists
              rm -f ~/.gradle/caches/modules-2
              
              # Create symlink
              ln -sfn "$(pwd)/.gradle-cache/caches/modules-2" ~/.gradle/caches/modules-2
              echo "✓ Using cached dependencies from .gradle-cache"
          fi
          
          # Setup wrapper distribution cache
          if [ -d ".gradle-cache/wrapper/dists" ]; then
              mkdir -p ~/.gradle/wrapper
              rm -f ~/.gradle/wrapper/dists
              ln -sfn "$(pwd)/.gradle-cache/wrapper/dists" ~/.gradle/wrapper/dists
              echo "✓ Using cached Gradle wrapper distributions"
          fi
          EOF
          
          chmod +x gradle-dependency-cache/use-cache.sh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-dependency-cache
          path: gradle-dependency-cache/
          retention-days: 90
      
      - name: Push to cache branch
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Create or switch to cache branch
          git checkout -b gradle-dependency-cache 2>/dev/null || git checkout gradle-dependency-cache
          
          # Prepare cache directory
          rm -rf .gradle-cache
          mv gradle-dependency-cache .gradle-cache
          
          # Add files
          git add .gradle-cache/
          git add -f .gradle-cache/use-cache.sh 2>/dev/null || true
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Gradle dependency cache - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin gradle-dependency-cache --force
            echo "✓ Pushed to gradle-dependency-cache branch"
          fi
