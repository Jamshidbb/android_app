name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Backup and replace build files
        run: |
          # Backup original files
          if [ -f "build.gradle.kts" ]; then
            cp build.gradle.kts build.gradle.kts.original
          fi
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.original
          fi
          
          # Create settings.gradle.kts with proper plugin management
          printf '%s\n' \
            'pluginManagement {' \
            '    repositories {' \
            '        google()' \
            '        mavenCentral()' \
            '        gradlePluginPortal()' \
            '    }' \
            '}' \
            '' \
            'dependencyResolutionManagement {' \
            '    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)' \
            '    repositories {' \
            '        google()' \
            '        mavenCentral()' \
            '        maven("https://jitpack.io")' \
            '    }' \
            '}' \
            '' \
            'rootProject.name = "temp-project"' \
            'include(":app")' > settings.gradle.kts
          
          # Create build.gradle.kts (without repository declarations to avoid conflict)
          printf '%s\n' \
            'plugins {' \
            '    id("com.android.application") version "9.0.0" apply false' \
            '    id("org.jetbrains.kotlin.android") version "1.9.0" apply false' \
            '}' \
            '' \
            'tasks.register("downloadDependencies") {' \
            '    doLast {' \
            '        println("Dependencies downloaded successfully")' \
            '    }' \
            '}' \
            '' \
            'tasks.register("resolveAllDependencies") {' \
            '    doLast {' \
            '        configurations.forEach { config ->' \
            '            if (config.isCanBeResolved) {' \
            '                try {' \
            '                    config.files' \
            '                } catch (e: Exception) {' \
            '                    println("Could not resolve ${config.name}: ${e.message}")' \
            '                }' \
            '            }' \
            '        }' \
            '    }' \
            '}' > build.gradle.kts
          
          # Create app/build.gradle.kts (without repositories)
          mkdir -p app
          printf '%s\n' \
            'plugins {' \
            '    id("com.android.application")' \
            '    id("org.jetbrains.kotlin.android")' \
            '}' \
            '' \
            'android {' \
            '    namespace = "com.example.temp"' \
            '    compileSdk = 34' \
            '' \
            '    defaultConfig {' \
            '        applicationId = "com.example.temp"' \
            '        minSdk = 24' \
            '        targetSdk = 34' \
            '        versionCode = 1' \
            '        versionName = "1.0"' \
            '    }' \
            '}' \
            '' \
            'dependencies {' \
            '    implementation("androidx.core:core-ktx:1.12.0")' \
            '    implementation("androidx.appcompat:appcompat:1.6.1")' \
            '    implementation("com.google.android.material:material:1.11.0")' \
            '}' > app/build.gradle.kts
          
          echo "Created temporary build files"
      
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            GRADLE_VERSION="9.2.1"
            wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
            unzip -q gradle-${GRADLE_VERSION}-bin.zip
            ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
            rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip
          fi
          chmod +x gradlew
      
      - name: Download dependencies
        run: |
          echo "Downloading Android plugin and dependencies..."
          
          # Try to just get the plugin first
          ./gradlew --no-daemon --stacktrace buildscript 2>&1 | head -100 || true
          
          # Download dependencies
          ./gradlew --no-daemon --stacktrace resolveAllDependencies 2>&1 || true
          
          # Download specific configurations
          ./gradlew --no-daemon dependencies --configuration classpath 2>&1 || true
          ./gradlew --no-daemon dependencies --configuration compileClasspath 2>&1 || true
          ./gradlew --no-daemon dependencies --configuration runtimeClasspath 2>&1 || true
          
          echo "Dependency download completed"
          
          # Show cache size
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
          fi
      
      - name: Package dependencies
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy wrapper
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy build files for reference
          cp settings.gradle.kts .gradle-dependencies/settings.gradle.kts.working 2>/dev/null || true
          cp build.gradle.kts .gradle-dependencies/build.gradle.kts.working 2>/dev/null || true
          
          # Copy original files
          cp build.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          cp settings.gradle.kts.original .gradle-dependencies/ 2>/dev/null || true
          
          # Copy caches
          if [ -d "$HOME/.gradle/caches" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/caches .gradle-dependencies/.gradle/ 2>/dev/null || true
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/ 2>/dev/null || true
          fi
          
          # Create restore script
          printf '%s\n' '#!/bin/bash' > .gradle-dependencies/restore.sh
          printf '%s\n' 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'echo "Restoring Gradle dependencies..."' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'if [ -d "$SCRIPT_DIR/gradle" ]; then cp -r "$SCRIPT_DIR/gradle" "$REPO_ROOT/"; fi' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'if [ -f "$SCRIPT_DIR/gradlew" ]; then cp "$SCRIPT_DIR/gradlew" "$REPO_ROOT/" && chmod +x "$REPO_ROOT/gradlew"; fi' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then mkdir -p "$HOME/.gradle" && cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"; fi' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then mkdir -p "$HOME/.gradle" && cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"; fi' >> .gradle-dependencies/restore.sh
          printf '%s\n' 'echo "Restore complete"' >> .gradle-dependencies/restore.sh
          chmod +x .gradle-dependencies/restore.sh
          
          # Create README
          printf '%s\n' '# Gradle Dependencies Cache' > .gradle-dependencies/README.md
          printf '%s\n' '' >> .gradle-dependencies/README.md
          printf '%s\n' '## Restore' >> .gradle-dependencies/README.md
          printf '%s\n' '```bash' >> .gradle-dependencies/README.md
          printf '%s\n' '.gradle-dependencies/restore.sh' >> .gradle-dependencies/README.md
          printf '%s\n' '```' >> .gradle-dependencies/README.md
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-cache
          path: .gradle-dependencies/
          retention-days: 7
      
      - name: Restore original files
        if: always()
        run: |
          if [ -f "build.gradle.kts.original" ]; then
            mv build.gradle.kts.original build.gradle.kts
          fi
          if [ -f "settings.gradle.kts.original" ]; then
            mv settings.gradle.kts.original settings.gradle.kts
          fi
          rm -rf app 2>/dev/null || true
