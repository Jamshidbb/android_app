name: Gradle Dependencies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Download dependencies only (no build)
        run: |
          chmod +x gradlew
          # This downloads dependencies to ~/.gradle/caches without building
          ./gradlew build --dry-run 2>&1 || true
          ./gradlew dependencies 2>&1 || true
      
      - name: Prepare dependency cache (NO GRADLE DISTRIBUTION)
        run: |
          mkdir -p offline-cache
          
          # Only copy the dependency modules, NOT the whole Gradle distribution
          if [ -d ~/.gradle/caches/modules-2 ]; then
            cp -r ~/.gradle/caches/modules-2 offline-cache/
            echo "✅ Copied dependency modules"
          fi
          
          # Copy transforms cache (Android specific)
          if [ -d ~/.gradle/caches/transforms-3 ]; then
            cp -r ~/.gradle/caches/transforms-3 offline-cache/ 2>/dev/null || true
            echo "✅ Copied transforms cache"
          fi
          
          # Copy Kotlin DSL cache if exists
          if [ -d ~/.gradle/caches/kotlin-dsl ]; then
            cp -r ~/.gradle/caches/kotlin-dsl offline-cache/ 2>/dev/null || true
            echo "✅ Copied Kotlin DSL cache"
          fi
          
          # Show size and count of cached files
          JAR_COUNT=$(find offline-cache -name "*.jar" 2>/dev/null | wc -l)
          CACHE_SIZE=$(du -sh offline-cache 2>/dev/null | cut -f1)
          echo "📦 Cache contains $JAR_COUNT JAR files, total size: $CACHE_SIZE"
          
          # Create install script for local use
          echo '#!/bin/bash' > offline-cache/install.sh
          echo 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> offline-cache/install.sh
          echo 'mkdir -p ~/.gradle' >> offline-cache/install.sh
          echo 'if [ -d "$SCRIPT_DIR/modules-2" ]; then' >> offline-cache/install.sh
          echo '  ln -sfn "$SCRIPT_DIR/modules-2" ~/.gradle/caches/modules-2' >> offline-cache/install.sh
          echo '  echo "✓ Dependency cache linked"' >> offline-cache/install.sh
          echo 'fi' >> offline-cache/install.sh
          echo 'if [ -d "$SCRIPT_DIR/transforms-3" ]; then' >> offline-cache/install.sh
          echo '  ln -sfn "$SCRIPT_DIR/transforms-3" ~/.gradle/caches/transforms-3' >> offline-cache/install.sh
          echo '  echo "✓ Transforms cache linked"' >> offline-cache/install.sh
          echo 'fi' >> offline-cache/install.sh
          echo 'if [ -d "$SCRIPT_DIR/kotlin-dsl" ]; then' >> offline-cache/install.sh
          echo '  ln -sfn "$SCRIPT_DIR/kotlin-dsl" ~/.gradle/caches/kotlin-dsl' >> offline-cache/install.sh
          echo '  echo "✓ Kotlin DSL cache linked"' >> offline-cache/install.sh
          echo 'fi' >> offline-cache/install.sh
          
          chmod +x offline-cache/install.sh
      
      - name: Push cache to branch (NO LARGE FILES)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Delete old branch if exists
          git push origin --delete gradle-cache 2>/dev/null || true
          
          # Create new orphan branch
          git checkout --orphan gradle-cache
          git rm -rf . 2>/dev/null || true
          
          # Copy only the cache (no gradle distribution)
          cp -r offline-cache/* .
          rm -rf offline-cache
          
          # Create README
          echo "# Gradle Dependency Cache" > README.md
          echo "" >> README.md
          echo "This branch contains pre-downloaded Gradle dependencies (NO Gradle distribution)." >> README.md
          echo "" >> README.md
          echo "## Usage" >> README.md
          echo "" >> README.md
          echo "1. Checkout this branch:" >> README.md
          echo "   \`\`\`bash" >> README.md
          echo "   git fetch origin gradle-cache" >> README.md
          echo "   git checkout gradle-cache" >> README.md
          echo "   \`\`\`" >> README.md
          echo "" >> README.md
          echo "2. Install the cache:" >> README.md
          echo "   \`\`\`bash" >> README.md
          echo "   ./install.sh" >> README.md
          echo "   \`\`\`" >> README.md
          echo "" >> README.md
          echo "3. Return to your working branch and build offline:" >> README.md
          echo "   \`\`\`bash" >> README.md
          echo "   git checkout -" >> README.md
          echo "   ./gradlew build --offline" >> README.md
          echo "   \`\`\`" >> README.md
          
          git add .
          git commit -m "Gradle dependency cache $(date +%Y%m%d_%H%M%S)"
          git push origin gradle-cache --force
          
          echo "✅ Cache pushed to https://github.com/${{ github.repository }}/tree/gradle-cache"
