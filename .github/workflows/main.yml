name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 'wrapper'  # Uses your gradle-wrapper.properties
      
      - name: Make Gradlew executable
        run: chmod +x gradlew
      
      - name: Download all dependencies
        run: |
          # This will download dependencies from YOUR actual build files
          ./gradlew build --dry-run
          ./gradlew dependencies
          
          # Download all possible configurations
          ./gradlew downloadDependencies
          
          echo "Dependency download completed"
          
          # Show cache size
          echo "Total cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
      
      - name: Zip and split Gradle cache
        run: |
          echo "Zipping Gradle cache..."
          
          mkdir -p gradle-cache
          
          # Zip the entire Gradle cache
          zip -r gradle-cache/gradle-cache.zip $HOME/.gradle/caches $HOME/.gradle/wrapper
          
          # Create checksum
          sha256sum gradle-cache/gradle-cache.zip > gradle-cache/checksum.txt
          
          # Split into 95MB parts
          cd gradle-cache
          split -b 95m gradle-cache.zip gradle-cache.zip.part-
          rm gradle-cache.zip
          cd ..
          
          # Create restore script
          cat > gradle-cache/restore.sh << 'SCRIPT_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          
          echo "Restoring Gradle cache from split parts..."
          PART_COUNT=$(ls gradle-cache.zip.part-* 2>/dev/null | wc -l)
          if [ $PART_COUNT -eq 0 ]; then
              echo "ERROR: No part files found"
              exit 1
          fi
          
          echo "Found $PART_COUNT parts"
          cat gradle-cache.zip.part-* > gradle-cache.zip
          
          if sha256sum -c checksum.txt 2>/dev/null; then
              echo "✓ Checksum verified"
          else
              echo "WARNING: Checksum verification failed"
          fi
          
          unzip -q gradle-cache.zip -d $HOME/
          rm gradle-cache.zip
          echo "✅ Gradle cache restored successfully!"
          SCRIPT_EOF
          
          chmod +x gradle-cache/restore.sh
          
          cat > gradle-cache/README.md << 'README_EOF'
          # Gradle Cache from Your Repository
          
          This contains dependencies from YOUR actual build files.
          
          ## Restore Cache
          ```bash
          ./restore.sh
