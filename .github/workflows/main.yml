name: Download Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Get Gradle Wrapper version
        id: gradle-version
        run: |
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            DIST_URL=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | cut -d'=' -f2)
            GRADLE_VERSION=$(echo $DIST_URL | grep -oP 'gradle-\K[0-9.]+')
            echo "gradle_version=$GRADLE_VERSION" >> $GITHUB_OUTPUT
            echo "Found Gradle version: $GRADLE_VERSION"
          else
            echo "No gradle-wrapper.properties found"
            exit 1
          fi
      
      - name: Setup Gradle wrapper
        run: |
          GRADLE_VERSION="${{ steps.gradle-version.outputs.gradle_version }}"
          if [ ! -z "$GRADLE_VERSION" ]; then
            if [ ! -f "gradlew" ]; then
              ./gradlew wrapper --gradle-version $GRADLE_VERSION
            fi
            chmod +x gradlew
          fi
      
      - name: Create temporary settings for dependency resolution
        run: |
          # Backup original files
          if [ -f "settings.gradle.kts" ]; then
            cp settings.gradle.kts settings.gradle.kts.bak
          elif [ -f "settings.gradle" ]; then
            cp settings.gradle settings.gradle.bak
          fi
          
          # Ensure Google and Maven Central repositories are available
          if [ -f "settings.gradle.kts" ]; then
            cat >> settings.gradle.kts << 'EOF'
            
            dependencyResolutionManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            EOF
          elif [ -f "settings.gradle" ]; then
            cat >> settings.gradle << 'EOF'
            
            dependencyResolutionManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            EOF
          else
            # Create settings.gradle if it doesn't exist
            cat > settings.gradle << 'EOF'
            dependencyResolutionManagement {
                repositories {
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
            }
            rootProject.name = "temp-project"
            EOF
          fi
      
      - name: Download dependencies (safe method)
        id: download-deps
        run: |
          chmod +x gradlew
          
          # Download Gradle wrapper distribution
          ./gradlew --version
          
          # Download dependencies without building
          echo "Downloading dependencies..."
          
          # Try multiple approaches to download dependencies
          ./gradlew downloadRepositories || true
          ./gradlew dependencies --configuration compileClasspath --no-daemon || true
          ./gradlew dependencies --configuration runtimeClasspath --no-daemon || true
          ./gradlew dependencies --configuration implementation --no-daemon || true
          
          # For Android projects
          ./gradlew dependencies --configuration androidTestCompileClasspath --no-daemon || true
          ./gradlew dependencies --configuration debugCompileClasspath --no-daemon || true
          
          # Download all dependencies through resolve
          ./gradlew resolveAllDependencies --no-daemon || true
          
          # Alternative: Use the dependency insight to trigger downloads
          ./gradlew build -x test -x lint -x compileDebugJavaWithJavac -x compileReleaseJavaWithJavac --no-daemon --continue || true
          
          echo "Dependencies download attempt completed"
          
          # Show what was downloaded
          if [ -d "$HOME/.gradle/caches/modules-2/files-2.1" ]; then
            echo "Dependencies downloaded to: $HOME/.gradle/caches/modules-2/files-2.1"
            find $HOME/.gradle/caches/modules-2/files-2.1 -type f -name "*.jar" 2>/dev/null | head -20
          fi
      
      - name: Prepare dependencies for commit
        run: |
          mkdir -p .gradle-dependencies
          
          # Copy Gradle wrapper
          cp -r gradle .gradle-dependencies/ 2>/dev/null || true
          cp gradlew .gradle-dependencies/ 2>/dev/null || true
          cp gradlew.bat .gradle-dependencies/ 2>/dev/null || true
          
          # Copy build files
          find . -maxdepth 2 -name "build.gradle*" -exec cp {} .gradle-dependencies/ \; 2>/dev/null || true
          find . -maxdepth 2 -name "settings.gradle*" -exec cp {} .gradle-dependencies/ \; 2>/dev/null || true
          
          # Copy dependency cache
          if [ -d "$HOME/.gradle/caches" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/caches .gradle-dependencies/.gradle/
          fi
          
          if [ -d "$HOME/.gradle/wrapper" ]; then
            mkdir -p .gradle-dependencies/.gradle
            cp -r $HOME/.gradle/wrapper .gradle-dependencies/.gradle/
          fi
          
          # Create restore script
          cat > .gradle-dependencies/restore-dependencies.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          REPO_ROOT="$(cd "$SCRIPT_DIR/.." && pwd)"
          
          echo "Restoring Gradle dependencies from cached files..."
          
          # Restore wrapper files
          cp -r "$SCRIPT_DIR"/gradle "$REPO_ROOT"/ 2>/dev/null || echo "No gradle directory to restore"
          cp "$SCRIPT_DIR"/gradlew "$REPO_ROOT"/ 2>/dev/null || echo "No gradlew to restore"
          cp "$SCRIPT_DIR"/gradlew.bat "$REPO_ROOT"/ 2>/dev/null || true
          
          # Restore build files
          cp "$SCRIPT_DIR"/build.gradle* "$REPO_ROOT"/ 2>/dev/null || true
          cp "$SCRIPT_DIR"/settings.gradle* "$REPO_ROOT"/ 2>/dev/null || true
          
          # Restore caches
          if [ -d "$SCRIPT_DIR/.gradle/caches" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/caches" "$HOME/.gradle/"
            echo "✓ Gradle caches restored"
          fi
          
          if [ -d "$SCRIPT_DIR/.gradle/wrapper" ]; then
            mkdir -p "$HOME/.gradle"
            cp -r "$SCRIPT_DIR/.gradle/wrapper" "$HOME/.gradle/"
            echo "✓ Gradle wrapper distributions restored"
          fi
          
          chmod +x "$REPO_ROOT/gradlew" 2>/dev/null || true
          echo "✓ Dependencies restored successfully!"
          echo "You can now run './gradlew build' locally"
          EOF
          
          chmod +x .gradle-dependencies/restore-dependencies.sh
          
          # Create usage instructions
          cat > .gradle-dependencies/README.md << 'EOF'
          # Gradle Dependencies Cache
          
          This contains pre-downloaded Gradle dependencies.
          
          ## Restore dependencies:
          ```bash
          cd .gradle-dependencies
          ./restore-dependencies.sh
          cd ..
