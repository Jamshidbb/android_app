name: Gradle Dependencies

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  download-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2.1'
      
      - name: Create temporary build files
        run: |
          # Backup original files
          [ -f "build.gradle.kts" ] && cp build.gradle.kts build.gradle.kts.original
          [ -f "settings.gradle.kts" ] && cp settings.gradle.kts settings.gradle.kts.original
          
          # Create settings.gradle.kts
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://jitpack.io")
              }
          }
          
          rootProject.name = "temp-project"
          include(":app")
          EOF
          
          # Create root build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.5.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.20" apply false
          }
          EOF
          
          # Create app/build.gradle.kts
          mkdir -p app
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          
          android {
              namespace = "com.example.temp"
              compileSdk = 34
              
              defaultConfig {
                  applicationId = "com.example.temp"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
          
          echo "Created temporary build files"
      
      - name: Download dependencies
        run: |
          gradle --no-daemon dependencies || true
          gradle --no-daemon build --dry-run || true
          echo "Dependency download completed"
          
          # Show cache size
          echo "Total cache size: $(du -sh $HOME/.gradle/caches | cut -f1)"
      
      - name: Zip and split Gradle cache
        run: |
          echo "Zipping Gradle cache..."
          
          # Create directory for split files
          mkdir -p gradle-cache-parts
          
          # Zip the entire Gradle cache
          zip -r gradle-cache.zip $HOME/.gradle/caches $HOME/.gradle/wrapper
          
          # Split into 95MB parts (safe under GitHub's 100MB limit)
          echo "Splitting into 95MB parts..."
          split -b 95m gradle-cache.zip gradle-cache-parts/gradle-cache.zip.part-
          
          # Count parts
          PART_COUNT=$(ls gradle-cache-parts/ | wc -l)
          echo "Created $PART_COUNT parts"
          
          # List parts with sizes
          ls -lh gradle-cache-parts/
          
          # Create checksum file for verification
          sha256sum gradle-cache.zip > gradle-cache-parts/checksum.txt
          
          # Create manifest of parts
          ls -1 gradle-cache-parts/ > gradle-cache-parts/manifest.txt
          
          # Create restoration script
          cat > gradle-cache-parts/restore.sh << 'EOF'
          #!/bin/bash
          echo "Restoring Gradle cache from split parts..."
          
          # Check if all parts exist
          MISSING=0
          for part in gradle-cache.zip.part-*; do
              if [ ! -f "$part" ]; then
                  echo "Missing: $part"
                  MISSING=1
              fi
          done
          
          if [ $MISSING -eq 1 ]; then
              echo "ERROR: Missing parts. Please download all parts first."
              exit 1
          fi
          
          # Combine parts
          echo "Combining parts..."
          cat gradle-cache.zip.part-* > gradle-cache.zip
          
          # Verify checksum
          echo "Verifying checksum..."
          sha256sum -c checksum.txt
          
          if [ $? -ne 0 ]; then
              echo "ERROR: Checksum verification failed!"
              exit 1
          fi
          
          # Extract
          echo "Extracting to ~/.gradle/..."
          unzip -q gradle-cache.zip -d $HOME/
          
          # Cleanup
          rm gradle-cache.zip
          
          echo "✅ Gradle cache restored successfully!"
          echo "Cache location: ~/.gradle/caches/"
          EOF
          chmod +x gradle-cache-parts/restore.sh
          
          # Create setup script at root level
          cat > setup-gradle-cache.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          
          if [ -d "$SCRIPT_DIR/gradle-cache-parts" ]; then
              cd "$SCRIPT_DIR/gradle-cache-parts"
              ./restore.sh
              cd "$SCRIPT_DIR"
          else
              echo "ERROR: gradle-cache-parts directory not found"
              echo "Please run the Gradle Dependencies workflow first"
              exit 1
          fi
          EOF
          chmod +x setup-gradle-cache.sh
          
          echo "Zip and split completed"
      
      - name: Restore original build files
        run: |
          [ -f "build.gradle.kts.original" ] && mv build.gradle.kts.original build.gradle.kts
          [ -f "settings.gradle.kts.original" ] && mv settings.gradle.kts.original settings.gradle.kts
          rm -rf app 2>/dev/null || true
      
      - name: Commit and push parts one by one
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ensure .gitignore doesn't exclude our files
          if [ -f ".gitignore" ]; then
            sed -i '/gradle-cache-parts/d' .gitignore
            sed -i '/setup-gradle-cache.sh/d' .gitignore
          fi
          
          # First, add the scripts and metadata
          git add gradle-cache-parts/restore.sh
          git add gradle-cache-parts/checksum.txt
          git add gradle-cache-parts/manifest.txt
          git add setup-gradle-cache.sh
          git commit -m "Add Gradle cache restore scripts [skip ci]" || true
          git push origin ${{ github.ref_name }}
          
          # Get list of part files
          PARTS=$(ls gradle-cache-parts/gradle-cache.zip.part-* 2>/dev/null | sort)
          
          # Push each part individually
          for PART in $PARTS; do
            PART_NAME=$(basename $PART)
            echo "Pushing $PART_NAME..."
            
            # Add this part
            git add $PART
            
            # Commit with part name
            git commit -m "Add Gradle cache part: $PART_NAME [skip ci]" || true
            
            # Push immediately
            git push origin ${{ github.ref_name }}
            
            echo "✅ Pushed $PART_NAME"
          done
          
          echo ""
          echo "=============================================="
          echo "✅ All parts pushed successfully!"
          echo "Total parts: $(ls gradle-cache-parts/gradle-cache.zip.part-* 2>/dev/null | wc -l)"
          echo "=============================================="
      
      - name: Create README
        run: |
          cat > gradle-cache-parts/README.md << 'EOF'
          # Gradle Cache Split Parts
          
          This directory contains the Gradle cache split into 95MB parts.
          
          ## Total Parts
          $(ls -1 gradle-cache.zip.part-* 2>/dev/null | wc -l) parts
          
          ## Restore Instructions
          
          ### Automatic Restore
          ```bash
          # From repository root
          ./setup-gradle-cache.sh
